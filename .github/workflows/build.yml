name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          set -x
          PYTHON_URLS=(
            "https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.10.13+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz"
          )
          
          for url in "${PYTHON_URLS[@]}"; do
            current_filename=$(basename "$url")
            rm -f "$current_filename"
            if wget -v "$url" -O "$current_filename"; then
              if [ $(du -m "$current_filename" | cut -f1) -ge 25 ] && file "$current_filename" | grep -qi "gzip"; then
                echo "✅ Python下载成功"
                filename="$current_filename"
                break
              fi
            fi
          done
          
          mkdir -p python
          tar -xzvf "$filename" -C python --strip-components=1 --warning=no-unknown-keyword --overwrite
          [ -f "./python/bin/python" ] || { echo "错误：Python解压失败"; exit 1; }
          echo "✅ Python版本：$(./python/bin/python --version)"

      - name: 安装libaio1（清理缓存+最新可用版本）
        run: |
          set -x
          set -euo pipefail
          
          echo "=== 1. 清理apt缓存+修复包数据库（关键！） ==="
          # 解决apt安装后文件未释放的问题：清理缓存+修复可能损坏的包数据库
          sudo apt-get clean  # 清理下载缓存
          sudo apt-get autoclean  # 清理旧版本缓存
          sudo dpkg --configure -a  # 修复未配置的包
          sudo apt-get update -y -v  # 强制刷新源缓存
          
          echo "=== 2. 确保universe源启用（24.04 deb822格式） ==="
          sudo apt-get install -y software-properties-common
          if ! grep -q "universe" /etc/apt/sources.list.d/ubuntu.sources; then
            sudo add-apt-repository -y universe
            sudo apt-get update -y -v || { echo "错误：apt update失败"; exit 1; }
          fi
          
          echo "=== 3. 重新尝试apt安装（清理后重试） ==="
          # 显式查看当前可用的libaio1版本（辅助确认是否有包）
          echo "当前apt仓库中可用的libaio1版本："
          apt-cache policy libaio1 || true
          
          # 强制重新安装，确保文件释放
          if sudo apt-get install -y --reinstall -v libaio1; then
            echo "✅ apt重新安装成功，检查文件是否存在"
            # 立即检查文件，避免缓存干扰
            if [ -f "/lib/x86_64-linux-gnu/libaio.so.1" ]; then
              echo "✅ apt安装后文件已释放"
            else
              echo "⚠️ apt安装成功但文件未找到，进入手动安装"
            fi
          else
            echo "⚠️ apt安装失败，进入手动安装"
          fi
          
          echo "=== 4. 多重验证+最新版本手动安装 ==="
          LIB_AIO_DEFAULT_PATH="/lib/x86_64-linux-gnu/libaio.so.1"
          LIB_AIO_PATH=""
          
          # 先检查默认路径
          if [ -f "$LIB_AIO_DEFAULT_PATH" ]; then
            LIB_AIO_PATH="$LIB_AIO_DEFAULT_PATH"
          else
            # 查找文件（防止路径异常）
            LIB_AIO_PATH=$(find /lib/x86_64-linux-gnu/ /usr/lib/x86_64-linux-gnu/ -name "libaio.so.1" | head -n 1)
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "❌ 未找到文件，手动安装Ubuntu 24.04最新可用版本"
              
              # 关键：更新为Ubuntu 24.04当前可用的libaio1版本链接（从Ubuntu Packages查询）
              # 版本：0.3.113-6（24.04 noble当前最新版本，经测试源存在）
              LIB_AIO_URLS=(
                "http://archive.ubuntu.com/ubuntu/pool/universe/liba/libaio/libaio1_0.3.113-6_amd64.deb"  # Ubuntu官方主源（100%有效）
                "https://mirrors.aliyun.com/ubuntu/pool/universe/liba/libaio/libaio1_0.3.113-6_amd64.deb"  # 阿里云Ubuntu源（国内）
                "https://mirrors.tuna.tsinghua.edu.cn/ubuntu/pool/universe/liba/libaio/libaio1_0.3.113-6_amd64.deb"  # 清华Ubuntu源（国内）
              )
              
              deb_downloaded=false
              for url in "${LIB_AIO_URLS[@]}"; do
                echo "=== 尝试下载最新版本：$url ==="
                rm -f libaio1.deb
                # 跳过证书验证（兼容部分源），超时30秒
                if wget -v --no-check-certificate --timeout=30 "$url" -O libaio1.deb; then
                  # 校验文件有效性（大小≥10KB，结构正常）
                  file_size=$(du -k libaio1.deb | cut -f1)
                  if [ "$file_size" -ge 10 ] && dpkg-deb --info libaio1.deb &> /dev/null; then
                    echo "✅ 手动下载成功（大小：$file_size KB）"
                    deb_downloaded=true
                    break
                  fi
                  echo "警告：下载的deb包无效，跳过"
                  rm -f libaio1.deb
                fi
                echo "❌ 该链接失败，尝试下一个"
              done
              
              if [ "$deb_downloaded" = false ]; then
                echo "错误：所有手动下载链接失败（请检查Ubuntu源是否更新）"
                exit 1
              fi
              
              # 强制安装最新版本deb包
              echo "=== 安装最新版本libaio1.deb ==="
              sudo dpkg -i --force-all libaio1.deb  # 忽略所有校验，确保文件释放
              if [ ! -f "$LIB_AIO_DEFAULT_PATH" ]; then
                echo "错误：手动安装后仍未找到$LIB_AIO_DEFAULT_PATH"
                # 辅助排查：显示目标目录内容
                echo "/lib/x86_64-linux-gnu/目录下的libaio相关文件："
                ls -la /lib/x86_64-linux-gnu/ | grep libaio || true
                exit 1
              fi
              LIB_AIO_PATH="$LIB_AIO_DEFAULT_PATH"
              echo "✅ 手动安装最新版本成功，文件路径：$LIB_AIO_PATH"
            fi
          fi
          
          echo "=== 5. 确认文件有效性+写入环境变量 ==="
          [ -r "$LIB_AIO_PATH" ] || { echo "错误：$LIB_AIO_PATH不可读"; exit 1; }
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> "$GITHUB_ENV"
          grep "LIB_AIO_PATH" "$GITHUB_ENV" || { echo "错误：环境变量写入失败"; exit 1; }
          echo "✅ libaio1安装完成（版本：$(dpkg -s libaio1 2>&1 | grep Version | awk '{print $2}')）"

      - name: 安装Python依赖（验证dmPython）
        run: |
          set -x
          ./python/bin/python -m pip install --upgrade pip==23.3.1
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==1.5.3 flask==2.2.5 werkzeug==2.2.3 pyinstaller==5.13.2
          
          # 深度验证dmPython（确保能加载libaio）
          if ! ./python/bin/python -c "
import dmPython
print('dmPython版本：', dmPython.__version__)
# 尝试创建连接（无需真实数据库，仅验证库加载）
try:
    conn = dmPython.connect()
except dmPython.Error as e:
    if 'Invalid connection string' in str(e):
        print('✅ dmPython库加载成功（连接字符串无效属正常）')
    else:
        raise
          "; then
            echo "错误：dmPython加载失败（libaio路径问题）"
            ldd $(find ./python -name "dmPython.*.so") | grep libaio || true  # 检查依赖关联
            exit 1
          fi
          echo "✅ 所有依赖验证成功"

      - name: 打包应用
        run: |
          set -x
          [ -f "./main.py" ] || { echo "错误：未找到main.py"; exit 1; }
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          python_lib_path="./python/lib/python3.10/site-packages"  # 固定Python 3.10路径
          
          # 执行打包
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths="$python_lib_path" \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --runtime-tmpdir=. \
            --strip \
            --no-compress \
            ./main.py
          
          # 验证产物
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"; exit 1;
          fi
          echo "✅ 打包完成，产物信息："
          ls -lh dist/myapp-linux
          file dist/myapp-linux  # 确认是可执行文件

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}