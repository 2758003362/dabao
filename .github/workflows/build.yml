name: 达梦API服务打包（兼容GLIBC 2.31）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境（兼容GLIBC 2.31）
        run: |
          wget https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ 静态Python配置完成，版本：$(./python/bin/python --version)"

      - name: 安装系统依赖
        run: |
          # 安装达梦数据库依赖libaio
          sudo apt-get update -qq
          sudo apt-get install -y libaio1
          
          # 获取libaio路径
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}')
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV

      - name: 安装低版本GLIBC兼容库
        run: |
          # 下载Ubuntu 20.04的libstdc++和libgcc（兼容GLIBC 2.31）
          wget -q "http://security.ubuntu.com/ubuntu/pool/main/g/gcc-10/libstdc++6_10.5.0-1ubuntu1~20.04_amd64.deb" -O libstdc++6.deb
          wget -q "http://security.ubuntu.com/ubuntu/pool/main/g/gcc-10/libgcc-s1_10.5.0-1ubuntu1~20.04_amd64.deb" -O libgcc-s1.deb
          
          # 提取库文件
          mkdir -p low_glibc_libs
          dpkg-deb -x libstdc++6.deb low_glibc_libs
          dpkg-deb -x libgcc-s1.deb low_glibc_libs
          
          # 记录库路径
          echo "LOW_GLIBC_LIBSTDCPP=$(find ./low_glibc_libs -name 'libstdc++.so.6' | head -n 1)" >> $GITHUB_ENV
          echo "LOW_GLIBC_LIBGCC=$(find ./low_glibc_libs -name 'libgcc_s.so.1' | head -n 1)" >> $GITHUB_ENV

      - name: 安装Python依赖（版本兼容配置）
        run: |
          ./python/bin/python -m pip install --upgrade pip
          # 核心依赖：指定兼容版本组合
          ./python/bin/python -m pip install \
            dmPython==2.5.22 \
            pandas==1.5.3 \
            numpy==1.23.5 \  # 与pandas 1.5.3严格兼容
            flask==2.2.3 \
            werkzeug==2.2.3 \
            pyinstaller==5.13.0
          
          # 验证依赖安装
          ./python/bin/python -c "import dmPython; import pandas; import flask; print('依赖验证通过')"

      - name: 打包应用（完整依赖收集）
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          
          # 构建打包命令
          PYINSTALLER_CMD="./python/bin/pyinstaller --onefile --name dm-api-service \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas._libs \
            --hidden-import=pandas._libs.interval \  # 解决pandas内部依赖
            --collect-all numpy \
            --collect-all pandas \
            --collect-all flask \
            --add-binary="${{ env.LIB_AIO_PATH }}:." \
            --add-binary="${{ env.LOW_GLIBC_LIBSTDCPP }}:." \
            --add-binary="${{ env.LOW_GLIBC_LIBGCC }}:." \
            ./main.py"
          
          echo "执行打包命令: $PYINSTALLER_CMD"
          eval $PYINSTALLER_CMD
          
          # 验证打包结果
          if [ -f "dist/dm-api-service" ]; then
            echo "打包成功: $(ls -lh dist/dm-api-service)"
          else
            echo "打包失败"
            exit 1
          fi

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: dm-api-service
          path: dist/dm-api-service
          retention-days: 14

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: dm-api-service

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: dm-api-service
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}