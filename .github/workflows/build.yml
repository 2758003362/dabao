name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          rm -rf python cpython-*.tar.gz
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20230726/cpython-3.10.12+20230726-x86_64-unknown-linux-gnu-install_only.tar.gz"
          
          for i in {1..3}; do
            echo "尝试第$i次下载Python包..."
            if wget --tries=3 --timeout=30 -O cpython-3.10.12.tar.gz "$PYTHON_URL"; then
              echo "✅ Python包下载成功"
              break
            else
              echo "⚠️ 下载失败，等待5秒后重试..."
              sleep 5
            fi
            if [ $i -eq 3 ]; then
              echo "❌ 错误：Python压缩包下载失败"
              exit 1
            fi
          done
          
          if [ ! -f "cpython-3.10.12.tar.gz" ]; then
            echo "❌ 错误：Python压缩包下载失败"
            exit 1
          fi
          
          FILE_SIZE=$(wc -c < "cpython-3.10.12.tar.gz")
          echo "下载文件大小: $FILE_SIZE 字节"
          if [ "$FILE_SIZE" -lt 25000000 ]; then
            echo "❌ 错误：下载文件不完整"
            exit 1
          fi
          
          mkdir -p python
          echo "开始解压Python包..."
          if ! tar -xzf cpython-3.10.12.tar.gz \
               -C python \
               --strip-components=1 \
               --exclude='__pycache__' \
               --exclude='*.pyc'; then
            echo "❌ 错误：Python解压失败"
            exit 1
          fi
          
          if [ ! -f "./python/bin/python3.10" ]; then
            echo "❌ 错误：Python可执行文件不存在"
            ls -la python/bin/
            exit 1
          fi
          
          cd python/bin
          ln -sf python3.10 python
          cd ../..
          
          echo "✅ Python配置成功，版本：$(./python/bin/python --version)"

      - name: 安装libaio1（彻底解决下载损坏问题）
        run: |
          # 1. 核心优化：增加旧版本专用源（100%保留旧包），避免源清理导致的404/损坏
          LIB_AIO_URLS=(
            "http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"  # 优先：旧版本仓库（不清理）
            "https://mirrors.tuna.tsinghua.edu.cn/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"  # 备用：清华源（稳定）
            "https://mirrors.ustc.edu.cn/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"    # 备用：中科大源（稳定）
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"      # 最后：官方源（可能清理）
          )
          
          # 2. 初始化状态，确保每次循环前清理旧文件
          DOWNLOAD_SUCCESS=0
          rm -f libaio1.deb  # 提前删除可能残留的损坏文件
          
          # 3. 多源+重试+完整性校验循环（每个源重试3次，确保下载完整）
          for url in "${LIB_AIO_URLS[@]}"; do
            echo "=== 正在尝试源：$url ==="
            # 每个源重试3次，应对网络波动
            for retry in {1..3}; do
              echo "  第$retry次下载..."
              # 去掉-q（显示详细日志），--timeout=30（避免超时挂起），--tries=1（重试由外层控制）
              wget --timeout=30 --tries=1 -O libaio1.deb "$url"
              
              # 4. 下载后立即校验完整性（关键：提前拦截损坏包）
              if [ -f "libaio1.deb" ]; then
                # 用dpkg-deb验证是否为有效deb包（排除HTML错误页、截断文件）
                if dpkg-deb --info libaio1.deb &> /dev/null; then
                  echo "✅ 该源下载成功且包完整"
                  DOWNLOAD_SUCCESS=1
                  break  # 跳出重试循环，进入下一个步骤
                else
                  echo "⚠️ 下载的包损坏（不是有效deb包），准备重试"
                  rm -f libaio1.deb  # 删除损坏文件，避免下次使用
                fi
              else
                echo "⚠️ 下载失败（未生成文件），准备重试"
              fi
              
              # 重试间隔2秒，避免频繁请求
              if [ $retry -lt 3 ]; then
                sleep 2
              fi
            done
            
            # 如果当前源成功，跳出多源循环
            if [ "$DOWNLOAD_SUCCESS" -eq 1 ]; then
              break
            else
              echo "❌ 该源3次重试均失败，尝试下一个源"
            fi
          done
          
          # 5. 检查最终下载结果
          if [ "$DOWNLOAD_SUCCESS" -ne 1 ] || [ ! -f "libaio1.deb" ]; then
            echo "❌ 错误：所有源均下载失败，无法获取完整的libaio1.deb"
            echo "建议手动下载后上传到仓库：http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            exit 1
          fi
          
          # 6. 再次校验（双重保险），然后执行安装
          echo "=== 最终校验包完整性 ==="
          if ! dpkg-deb --info libaio1.deb &> /dev/null; then
            echo "❌ 错误：最终校验发现包损坏"
            head -c 100 libaio1.deb | xxd  # 打印文件头部，辅助排查是否为HTML
            exit 1
          fi
          
          echo "=== 开始安装libaio1 ==="
          # --force-depends：适配Ubuntu 24.04的依赖版本差异
          if ! sudo dpkg -i --force-depends libaio1.deb; then
            echo "❌ 错误：安装失败（可能是系统依赖冲突）"
            echo "当前系统已安装的libaio相关包："
            dpkg -l | grep libaio  # 显示已安装包，辅助排查
            exit 1
          fi
          
          # 7. 验证安装结果（确保系统识别该包）
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "❌ 错误：安装后系统未识别libaio1"
            exit 1
          fi
          
          # 8. 获取并验证libaio路径（供后续打包使用）
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "获取到的libaio路径：[$LIB_AIO_PATH]"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "❌ 错误：获取的libaio路径无效"
            echo "系统中实际的libaio文件："
            ls -la /lib/x86_64-linux-gnu/ | grep libaio  # 显示实际文件，辅助排查
            exit 1
          fi
          
          # 写入环境变量，供后续步骤使用
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功（完整且可用）"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==2.1.4 flask==2.3.3 werkzeug==2.3.7 pyinstaller==6.16.0
          
          if ./python/bin/python -c "import dmPython" &> /dev/null; then
            echo "✅ dmPython安装成功"
          else
            echo "错误：dmPython安装失败（可能是libaio依赖问题）"
            exit 1
          fi
          echo "✅ 所有依赖安装完成"

      - name: 准备兼容的libstdc++
        run: |
          LIBSTDC_URLS=(
            "http://old-releases.ubuntu.com/ubuntu/pool/main/g/gcc-12/libstdc++6_12.1.0-2ubuntu1_amd64.deb"
            "https://mirrors.tuna.tsinghua.edu.cn/ubuntu/pool/main/g/gcc-12/libstdc++6_12.1.0-2ubuntu1_amd64.deb"
            "https://mirrors.ustc.edu.cn/ubuntu/pool/main/g/gcc-12/libstdc++6_12.1.0-2ubuntu1_amd64.deb"
          )
          
          DOWNLOAD_SUCCESS=0
          rm -f libstdc++6.deb
          for url in "${LIBSTDC_URLS[@]}"; do
            echo "=== 尝试从 $url 下载libstdc++6 ==="
            for retry in {1..3}; do
              echo "  第$retry次下载..."
              wget --timeout=30 --tries=1 -O libstdc++6.deb "$url"
              if [ -f "libstdc++6.deb" ] && dpkg-deb --info libstdc++6.deb &> /dev/null; then
                echo "✅ 下载成功且包完整"
                DOWNLOAD_SUCCESS=1
                break
              else
                echo "⚠️ 下载失败或包损坏，准备重试"
                rm -f libstdc++6.deb
                if [ $retry -lt 3 ]; then sleep 2; fi
              fi
            done
            if [ "$DOWNLOAD_SUCCESS" -eq 1 ]; then break; fi
          done
          
          if [ "$DOWNLOAD_SUCCESS" -ne 1 ]; then
            echo "❌ 错误：libstdc++6下载失败"
            exit 1
          fi
          
          rm -rf libstdc++_extract data.tar.xz
          mkdir -p libstdc++_extract
          ar x libstdc++6.deb data.tar.xz
          tar -xJf data.tar.xz -C libstdc++_extract ./usr/lib/x86_64-linux-gnu/libstdc++.so.6 -v
          
          TARGET_LIB="libstdc++_extract/usr/lib/x86_64-linux-gnu/libstdc++.so.6"
          if [ ! -f "$TARGET_LIB" ]; then
            echo "❌ 错误：未提取到libstdc++.so.6"
            exit 1
          fi
          
          mkdir -p usr/lib/x86_64-linux-gnu
          mv "$TARGET_LIB" usr/lib/x86_64-linux-gnu/
          
          if echo "$(objdump -p usr/lib/x86_64-linux-gnu/libstdc++.so.6)" | grep -q "GLIBC_2.31"; then
            echo "✅ 确认支持GLIBC 2.31"
          else
            echo "⚠️ 警告：未检测到GLIBC_2.31支持"
          fi
          echo "✅ libstdc++准备完成"

      - name: 打包应用（兼容GLIBC 2.31）
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}')
            if [ -z "$LIB_AIO_PATH" ]; then
              echo "错误：libaio路径无效"
              exit 1
            fi
          fi
          
          export LDFLAGS="-Wl,--wrap=memcpy -Wl,--wrap=memmove"
          ./python/bin/python -m PyInstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.10/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --add-binary="./usr/lib/x86_64-linux-gnu/libstdc++.so.6:." \
            --runtime-tmpdir=. \
            --strip \
            --noconfirm \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          
          echo "检查产物GLIBC依赖："
          objdump -p dist/myapp-linux | grep -A 10 "Version References:" || true
          echo "✅ 打包完成，产物大小：$(du -sh dist/myapp-linux | awk '{print $1}')"

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}