name: 达梦API服务打包（musl静态链接，全Linux兼容）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装musl工具链
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools
          if ! command -v musl-gcc &> /dev/null; then
            echo "错误：musl-tools安装失败"
            exit 1
          fi
          echo "✅ musl工具链安装完成"

      - name: 配置静态Python（自动适配目录结构）
        run: |
          # 确认存在的3.10.12版本
          PYTHON_TAR="cpython-3.10.12+20230726-x86_64-unknown-linux-musl-install_only.tar.gz"
          PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20230726/$PYTHON_TAR"
          EXPECTED_SHA256="9080014bee2d4bd1f96bcbebf447d40c35ae9354382246add1160bd0d433ebf7"
          
          # 下载
          echo "开始下载静态Python: $PYTHON_URL"
          if ! wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 5 \
                   --max-redirect=10 --content-disposition "$PYTHON_URL" -O "$PYTHON_TAR"; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 校验完整性
          echo "校验压缩包完整性..."
          ACTUAL_SHA256=$(sha256sum "$PYTHON_TAR" | awk '{print $1}')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "错误：Python压缩包损坏（SHA256不匹配）"
            echo "实际值: $ACTUAL_SHA256"
            echo "预期值: $EXPECTED_SHA256"
            exit 1
          fi
          
          # 解压（保留原始目录结构，不强制strip，避免路径错误）
          mkdir -p python-musl
          echo "开始解压Python压缩包（显示详细结构）..."
          if ! tar -xzvf "$PYTHON_TAR" -C python-musl; then  # 移除--strip-components，保留原始结构
            echo "错误：Python压缩包解压失败"
            exit 1
          fi
          
          # 关键修复：自动查找Python可执行文件（适配不同目录结构）
          echo "查找Python可执行文件..."
          PYTHON_BIN=$(find python-musl -name "python" -type f -path "*/bin/python" | head -n 1)
          
          if [ -z "$PYTHON_BIN" ] || [ ! -f "$PYTHON_BIN" ]; then
            echo "错误：未找到Python可执行文件"
            # 打印目录结构辅助排查
            echo "解压后的目录结构："
            tree python-musl  # 显示完整结构，明确文件位置
            exit 1
          fi
          
          # 验证静态链接
          echo "Python文件路径：$PYTHON_BIN"
          echo "Python文件类型检测结果："
          file "$PYTHON_BIN"
          
          if ! file "$PYTHON_BIN" | grep -q "statically linked"; then
            echo "错误：当前Python版本不是静态链接！"
            exit 1
          fi
          
          # 记录Python路径和site-packages路径（供后续使用）
          echo "PYTHON_BIN=$PYTHON_BIN" >> $GITHUB_ENV
          # 提取site-packages路径（bin的同级目录下的lib/python3.10/site-packages）
          PYTHON_LIB=$(dirname "$PYTHON_BIN")/../lib/python3.10/site-packages
          echo "PYTHON_LIB=$PYTHON_LIB" >> $GITHUB_ENV
          
          echo "✅ 确认是静态链接Python，版本：$("$PYTHON_BIN" --version)"

      - name: 编译静态libaio
        run: |
          wget https://pagure.io/libaio/archive/libaio-0.3.113/libaio-libaio-0.3.113.tar.gz
          tar -xzf libaio-libaio-0.3.113.tar.gz
          cd libaio-libaio-0.3.113
          
          sudo cp src/libaio.h /usr/include/
          make CC=musl-gcc CFLAGS="-fPIC -static -I/usr/include" LDFLAGS="-static"
          if [ ! -f "src/libaio.so.1.0.1" ]; then
            echo "错误：libaio编译失败"
            exit 1
          fi
          
          sudo cp src/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/
          sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/libaio.so.1
          LIB_AIO_PATH="/usr/lib/x86_64-linux-gnu/libaio.so.1"
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ 静态libaio编译完成"
          cd ..

      - name: 安装Python依赖
        run: |
          # 使用环境变量中的Python路径
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          if [ -z "$PYTHON_BIN" ] || [ ! -f "$PYTHON_BIN" ]; then
            echo "错误：Python路径无效"
            exit 1
          fi
          
          $PYTHON_BIN -m pip install --upgrade pip
          $PYTHON_BIN -m pip install \
            dmPython==2.5.22 \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0 \
            --no-cache-dir
          
          if ! $PYTHON_BIN -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython导入失败"
            exit 1
          fi
          echo "✅ 依赖安装完成"

      - name: 静态打包应用
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到main.py"
            exit 1
          fi
          
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          PYTHON_LIB="${{ env.PYTHON_LIB }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          
          # 验证路径有效性
          if [ -z "$PYTHON_BIN" ] || [ -z "$PYTHON_LIB" ] || [ -z "$LIB_AIO_PATH" ]; then
            echo "错误：环境变量路径缺失"
            exit 1
          fi
          
          # 使用动态获取的Python路径和依赖路径
          $PYTHON_BIN -m PyInstaller --onefile --name myapp-linux \
            --paths="$PYTHON_LIB" \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --add-binary="$LIB_AIO_PATH:." \
            --noupx \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          echo "✅ 打包完成"

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-musl-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-musl-static

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
