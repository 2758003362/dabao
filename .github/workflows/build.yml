name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          rm -rf python cpython-*.tar.gz
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20230726/cpython-3.10.12+20230726-x86_64-unknown-linux-gnu-install_only.tar.gz"
          
          for i in {1..3}; do
            echo "尝试第$i次下载Python包..."
            if wget --tries=3 --timeout=30 -O cpython-3.10.12.tar.gz "$PYTHON_URL"; then
              echo "✅ Python包下载成功"
              break
            else
              echo "⚠️ 下载失败，等待5秒后重试..."
              sleep 5
            fi
            if [ $i -eq 3 ]; then
              echo "❌ 错误：Python压缩包下载失败"
              exit 1
            fi
          done
          
          if [ ! -f "cpython-3.10.12.tar.gz" ]; then
            echo "❌ 错误：Python压缩包下载失败"
            exit 1
          fi
          
          FILE_SIZE=$(wc -c < "cpython-3.10.12.tar.gz")
          echo "下载文件大小: $FILE_SIZE 字节"
          if [ "$FILE_SIZE" -lt 25000000 ]; then
            echo "❌ 错误：下载文件不完整"
            exit 1
          fi
          
          mkdir -p python
          echo "开始解压Python包..."
          if ! tar -xzf cpython-3.10.12.tar.gz \
               -C python \
               --strip-components=1 \
               --exclude='__pycache__' \
               --exclude='*.pyc'; then
            echo "❌ 错误：Python解压失败"
            exit 1
          fi
          
          if [ ! -f "./python/bin/python3.10" ]; then
            echo "❌ 错误：Python可执行文件不存在"
            ls -la python/bin/
            exit 1
          fi
          
          cd python/bin
          ln -sf python3.10 python
          cd ../..
          
          echo "✅ Python配置成功，版本：$(./python/bin/python --version)"

      - name: 安装libaio1（修复下载损坏，增加校验）
        run: |
          # 核心优化1：增加旧版本仓库作为备用源，确保包存在；显示下载日志
          LIB_AIO_URLS=(
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"  # 官方源
            "https://mirrors.aliyun.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"  # 阿里云源
            "http://mirrors.163.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"    # 163源
            "http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"  # 旧版本备用源
          )
          
          # 核心优化2：添加重试机制+删除不完整文件+非静默日志
          DOWNLOAD_SUCCESS=0
          for url in "${LIB_AIO_URLS[@]}"; do
            echo "=== 尝试从 $url 下载libaio1 ==="
            # 去掉-q（静默），显示HTTP状态和进度；--tries=3重试3次；超时30秒
            if wget --tries=3 --timeout=30 -O libaio1.deb "$url"; then
              echo "✅ libaio1.deb下载成功"
              DOWNLOAD_SUCCESS=1
              break
            else
              echo "⚠️ 该源下载失败，尝试下一个"
              # 关键：删除不完整文件，避免后续用损坏包安装
              rm -f libaio1.deb
            fi
          done
          
          # 检查下载结果
          if [ "$DOWNLOAD_SUCCESS" -ne 1 ] || [ ! -f "libaio1.deb" ]; then
            echo "❌ 错误：所有源均下载失败，无法获取libaio1.deb"
            exit 1
          fi
          
          # 核心优化3：下载后验证deb包完整性（避免用损坏包安装）
          echo "=== 验证libaio1.deb完整性 ==="
          if ! dpkg-deb --info libaio1.deb &> /dev/null; then
            echo "❌ 错误：libaio1.deb损坏或不是有效deb包"
            # 打印文件前100字节，辅助排查是否为HTML错误页
            echo "文件前100字节内容："
            head -c 100 libaio1.deb | xxd
            exit 1
          fi
          echo "✅ libaio1.deb完整性验证通过"
          
          # 执行安装（保留--force-depends适配Ubuntu 24.04）
          echo "=== 安装libaio1 ==="
          if ! sudo dpkg -i --force-depends libaio1.deb; then
            echo "❌ 错误：libaio1安装失败（可能是系统依赖冲突）"
            # 显示dpkg详细状态，辅助排查
            dpkg -l | grep libaio
            exit 1
          fi
          
          # 验证安装结果
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "❌ 错误：libaio1安装后未被系统识别"
            exit 1
          fi
          
          # 获取并验证libaio路径
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "获取到的libaio路径：[$LIB_AIO_PATH]"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "❌ 错误：获取的libaio路径无效"
            # 显示系统中实际的libaio文件，辅助排查
            ls -la /lib/x86_64-linux-gnu/ | grep libaio
            exit 1
          fi
          
          # 写入环境变量供后续使用
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功，路径已写入环境变量"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==2.1.4 flask==2.3.3 werkzeug==2.3.7 pyinstaller==6.16.0
          
          if ./python/bin/python -c "import dmPython" &> /dev/null; then
            echo "✅ dmPython安装成功"
          else
            echo "错误：dmPython安装失败（可能是libaio依赖问题）"
            exit 1
          fi
          echo "✅ 所有依赖安装完成"

      - name: 准备兼容的libstdc++（修复404错误）
        run: |
          LIBSTDC_URLS=(
            "http://old-releases.ubuntu.com/ubuntu/pool/main/g/gcc-12/libstdc++6_12.1.0-2ubuntu1_amd64.deb"
            "https://mirrors.tuna.tsinghua.edu.cn/ubuntu/pool/main/g/gcc-12/libstdc++6_12.1.0-2ubuntu1_amd64.deb"
            "https://mirrors.ustc.edu.cn/ubuntu/pool/main/g/gcc-12/libstdc++6_12.1.0-2ubuntu1_amd64.deb"
          )
          
          DOWNLOAD_SUCCESS=0
          for url in "${LIBSTDC_URLS[@]}"; do
            echo "=== 尝试从 $url 下载libstdc++6 ==="
            if wget --tries=3 --timeout=30 -O libstdc++6.deb "$url"; then
              echo "✅ libstdc++6.deb下载成功"
              DOWNLOAD_SUCCESS=1
              break
            else
              echo "⚠️ 该源下载失败，尝试下一个"
              rm -f libstdc++6.deb
            fi
          done
          
          if [ "$DOWNLOAD_SUCCESS" -ne 1 ] || [ ! -f "libstdc++6.deb" ]; then
            echo "❌ 错误：所有源均下载失败"
            exit 1
          fi
          
          echo "=== 验证libstdc++6.deb完整性 ==="
          if ! dpkg-deb --info libstdc++6.deb &> /dev/null; then
            echo "❌ 错误：libstdc++6.deb损坏"
            head -c 100 libstdc++6.deb | xxd
            exit 1
          fi
          echo "✅ 完整性验证通过"
          
          rm -rf libstdc++_extract data.tar.xz
          mkdir -p libstdc++_extract
          
          echo "=== 提取data.tar.xz ==="
          if ! ar x libstdc++6.deb data.tar.xz; then
            echo "❌ 错误：提取data.tar.xz失败"
            ar t libstdc++6.deb
            exit 1
          fi
          
          if [ ! -f "data.tar.xz" ]; then
            echo "❌ 错误：未找到data.tar.xz"
            exit 1
          fi
          
          echo "=== 解压libstdc++.so.6 ==="
          if ! tar -xJf data.tar.xz -C libstdc++_extract ./usr/lib/x86_64-linux-gnu/libstdc++.so.6 -v; then
            echo "❌ 错误：解压失败"
            tar -tJf data.tar.xz | grep "usr/lib/x86_64-linux-gnu/libstdc++.so.6"
            exit 1
          fi
          
          TARGET_LIB="libstdc++_extract/usr/lib/x86_64-linux-gnu/libstdc++.so.6"
          if [ ! -f "$TARGET_LIB" ]; then
            echo "❌ 错误：未提取到libstdc++.so.6"
            find libstdc++_extract -type f
            exit 1
          fi
          
          mkdir -p usr/lib/x86_64-linux-gnu
          mv "$TARGET_LIB" usr/lib/x86_64-linux-gnu/
          
          echo "=== 验证GLIBC兼容性 ==="
          GLIBC_REQUIRE=$(objdump -p usr/lib/x86_64-linux-gnu/libstdc++.so.6 | grep -A 5 "GLIBC_" | head -10)
          if echo "$GLIBC_REQUIRE" | grep -q "GLIBC_2.31"; then
            echo "✅ 支持GLIBC 2.31"
          else
            echo "⚠️ 警告：未检测到GLIBC_2.31支持"
            echo "$GLIBC_REQUIRE"
          fi
          
          echo "✅ libstdc++准备完成"

      - name: 打包应用（兼容GLIBC 2.31）
        run: |
          echo "当前目录文件列表："
          ls -la
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          echo "✅ 确认main.py存在"
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          echo "从环境变量获取的libaio路径：[$LIB_AIO_PATH]"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "警告：环境变量路径无效，尝试重新获取..."
            LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "错误：重新获取路径仍无效"
              exit 1
            fi
            echo "fallback成功，路径：$LIB_AIO_PATH"
          fi
          
          export LDFLAGS="-Wl,--wrap=memcpy -Wl,--wrap=memmove"
          echo "设置链接器选项：$LDFLAGS"
          
          ./python/bin/python -m PyInstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.10/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --add-binary="./usr/lib/x86_64-linux-gnu/libstdc++.so.6:." \
            --runtime-tmpdir=. \
            --strip \
            --noconfirm \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败，未生成产物"
            exit 1
          fi
          
          echo "检查产物的GLIBC依赖："
          objdump -p dist/myapp-linux | grep -A 10 "Version References:" || true
          
          echo "✅ 打包完成，产物信息："
          ls -lh dist/myapp-linux

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}