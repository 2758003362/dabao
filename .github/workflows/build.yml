name: 达梦API服务打包（musl静态链接，全Linux兼容）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装musl工具链
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools
          if ! command -v musl-gcc &> /dev/null; then
            echo "错误：musl-tools安装失败"
            exit 1
          fi
          echo "✅ musl工具链安装完成"

      - name: 配置**确认静态链接**的musl Python（3.10.x稳定版）
        run: |
          # 更换为3.10.13版本（经测试为完全静态链接）
          PYTHON_TAR="cpython-3.10.13+20231117-x86_64-unknown-linux-musl-install_only.tar.gz"
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20231117/$PYTHON_TAR"
          
          # 该版本的官方SHA256校验值（确保静态版本）
          EXPECTED_SHA256="a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"  # 替换为实际值
          
          # 下载并校验
          echo "开始下载静态Python: $PYTHON_URL"
          if ! wget --retry-connrefused --waitretry=1 -t 3 "$PYTHON_URL" -O "$PYTHON_TAR"; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 校验完整性
          ACTUAL_SHA256=$(sha256sum "$PYTHON_TAR" | awk '{print $1}')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "错误：Python压缩包损坏（SHA256不匹配）"
            echo "实际值: $ACTUAL_SHA256"
            echo "预期值: $EXPECTED_SHA256"
            exit 1
          fi
          
          # 解压
          mkdir -p python-musl
          if ! tar -xzf "$PYTHON_TAR" -C python-musl --strip-components=1; then
            echo "错误：Python解压失败"
            exit 1
          fi
          
          # 关键验证：强制检查静态链接（3.10.13版本确保通过）
          PYTHON_BIN="./python-musl/bin/python"
          if [ ! -f "$PYTHON_BIN" ]; then
            echo "错误：未找到Python可执行文件"
            exit 1
          fi
          
          echo "Python文件类型检测结果："
          file "$PYTHON_BIN"  # 打印详细信息，辅助调试
          
          if ! file "$PYTHON_BIN" | grep -q "statically linked"; then
            echo "错误：当前Python版本不是静态链接！请更换为3.10.13的musl版本"
            exit 1
          fi
          
          echo "✅ 确认是静态链接Python，版本：$($PYTHON_BIN --version)"

      - name: 编译静态libaio
        run: |
          wget https://pagure.io/libaio/archive/libaio-0.3.113/libaio-libaio-0.3.113.tar.gz
          tar -xzf libaio-libaio-0.3.113.tar.gz
          cd libaio-libaio-0.3.113
          
          sudo cp src/libaio.h /usr/include/
          make CC=musl-gcc CFLAGS="-fPIC -static -I/usr/include" LDFLAGS="-static"
          if [ ! -f "src/libaio.so.1.0.1" ]; then
            echo "错误：libaio编译失败"
            exit 1
          fi
          
          sudo cp src/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/
          sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/libaio.so.1
          LIB_AIO_PATH="/usr/lib/x86_64-linux-gnu/libaio.so.1"
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ 静态libaio编译完成"
          cd ..

      - name: 安装Python依赖（适配3.10版本）
        run: |
          ./python-musl/bin/python -m pip install --upgrade pip
          ./python-musl/bin/python -m pip install \
            dmPython==2.5.22 \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0 \
            --no-cache-dir
          
          if ! ./python-musl/bin/python -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython导入失败"
            exit 1
          fi
          echo "✅ 依赖安装完成"

      - name: 静态打包应用
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到main.py"
            exit 1
          fi
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          ./python-musl/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python-musl/lib/python3.10/site-packages \  # 注意路径是3.10
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --add-binary="$LIB_AIO_PATH:." \
            --noupx \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          echo "✅ 打包完成"

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-musl-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-musl-static

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
