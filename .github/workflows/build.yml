name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest  # 即Ubuntu 24.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置低GLIBC兼容的静态Python环境
        run: |
          PYTHON_URLS=(
            "https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.10.13+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz"
            "https://github.com/astral-sh/python-build-standalone/releases/download/20240506/cpython-3.11.9+20240506-x86_64-unknown-linux-gnu-install_only.tar.gz"
          )
          
          filename=""
          for url in "${PYTHON_URLS[@]}"; do
            current_filename=$(basename "$url")
            echo "=== 下载Python: $url ==="
            rm -f "$current_filename"
            if wget -v --timeout=30 --tries=5 "$url" -O "$current_filename"; then
              if [ $(du -m "$current_filename" | cut -f1) -ge 25 ] && file "$current_filename" | grep -qi "gzip"; then
                echo "✅ Python下载成功"
                filename="$current_filename"
                break
              fi
              echo "警告：文件无效，跳过"
              rm -f "$current_filename"
            fi
          done
          
          if [ -z "$filename" ]; then
            echo "错误：Python下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzvf "$filename" -C python --strip-components=1 --warning=no-unknown-keyword --overwrite
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ Python配置完成：$(./python/bin/python --version)"

      - name: 安装libaio1（适配Ubuntu 24.04最新版本）
        run: |
          echo "=== 适配Ubuntu 24.04安装libaio1 ==="
          # 关键：先确认系统是否有libaio1包，避免盲目安装
          apt_cache_result=$(apt-cache search libaio1 | grep -w "libaio1")
          if [ -z "$apt_cache_result" ]; then
            echo "⚠️ 系统未搜索到libaio1，尝试添加universal源（Ubuntu 24.04默认可能未启用）"
            # 启用universal源（libaio1在universal仓库中）
            sudo sed -i '/^#\s*deb .* universe/s/^#//' /etc/apt/sources.list
            sudo apt-get update -y
          fi
          
          # 方案1：优先安装Ubuntu 24.04默认的libaio1版本（无需指定旧版本）
          if sudo apt-get install -y libaio1; then
            echo "✅ apt安装libaio1成功（版本：$(dpkg -s libaio1 | grep Version | awk '{print $2}')）"
          else
            echo "⚠️ apt安装失败，手动下载Ubuntu 24.04对应的libaio1版本"
            # 方案2：手动下载Ubuntu 24.04（noble）的libaio1（版本0.3.113-5，当前有效）
            LIB_AIO_URLS=(
              "http://archive.ubuntu.com/ubuntu/pool/universe/liba/libaio/libaio1_0.3.113-5_amd64.deb"  # 官方24.04源
              "https://mirrors.tuna.tsinghua.edu.cn/ubuntu/pool/universe/liba/libaio/libaio1_0.3.113-5_amd64.deb"  # 清华24.04源
              "https://launchpad.net/ubuntu/+archive/primary/+files/libaio1_0.3.113-5_amd64.deb"  # Launchpad官方包
            )
            
            deb_downloaded=false
            for url in "${LIB_AIO_URLS[@]}"; do
              echo "=== 下载libaio1（24.04版本）: $url ==="
              rm -f libaio1.deb
              if wget --progress=bar:force "$url" -O libaio1.deb; then
                # 校验：deb包大小约12KB，且结构有效
                if [ $(du -k libaio1.deb | cut -f1) -ge 10 ] && dpkg-deb --info libaio1.deb &> /dev/null; then
                  echo "✅ libaio1.deb下载成功"
                  deb_downloaded=true
                  break
                fi
                echo "警告：deb包无效，跳过"
                rm -f libaio1.deb
              fi
            done
            
            if [ "$deb_downloaded" = false ]; then
              echo "错误：所有libaio1下载失败"
              exit 1
            fi
            
            # 安装24.04版本的deb包
            sudo dpkg -i libaio1.deb || {
              echo "尝试修复依赖..."
              sudo apt-get -f install -y && sudo dpkg -i libaio1.deb
            }
            if [ $? -ne 0 ]; then
              echo "错误：libaio1.deb安装失败"
              exit 1
            fi
          fi
          
          # 验证并获取libaio.so.1路径
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1未安装成功"
            exit 1
          fi
          LIB_AIO_PATH=$(find /lib/x86_64-linux-gnu/ /usr/lib/x86_64-linux-gnu/ -name "libaio.so.1" | head -n 1)
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：未找到libaio.so.1"
            ls -la /lib/x86_64-linux-gnu/ | grep libaio
            exit 1
          fi
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装完成，路径：$LIB_AIO_PATH"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip==23.3.1
          ./python/bin/python -m pip install \
            dmPython==2.5.22 \
            pandas==1.5.3 \
            flask==2.2.5 \
            werkzeug==2.2.3 \
            pyinstaller==5.13.2
          
          if ! ./python/bin/python -c "import dmPython"; then
            echo "错误：dmPython导入失败"
            exit 1
          fi
          echo "✅ 所有依赖安装成功"

      - name: 打包应用
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到main.py"
            exit 1
          fi
          
          python_lib_path=$(find ./python/lib -name "python3.*" -type d | head -n 1)/site-packages
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths="$python_lib_path" \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --add-binary="${{ env.LIB_AIO_PATH }}:." \
            --runtime-tmpdir=. \
            --strip \
            --no-compress \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          
          # 验证GLIBC依赖
          if objdump -T dist/myapp-linux | grep GLIBC_ | grep -q -E 'GLIBC_2.3[2-9]|GLIBC_2.[4-9]'; then
            echo "⚠️ 存在高于GLIBC 2.31的依赖"
          else
            echo "✅ 无高于GLIBC 2.31的依赖"
          fi
          echo "✅ 打包完成"
          ls -lh dist/myapp-linux

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}