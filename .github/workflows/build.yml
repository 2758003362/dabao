name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          set -x
          PYTHON_URLS=(
            "https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.10.13+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz"
          )
          
          for url in "${PYTHON_URLS[@]}"; do
            current_filename=$(basename "$url")
            rm -f "$current_filename"
            if wget -v "$url" -O "$current_filename"; then
              if [ $(du -m "$current_filename" | cut -f1) -ge 25 ] && file "$current_filename" | grep -qi "gzip"; then
                echo "✅ Python下载成功"
                filename="$current_filename"
                break
              fi
            fi
          done
          
          mkdir -p python
          tar -xzvf "$filename" -C python --strip-components=1 --warning=no-unknown-keyword --overwrite
          [ -f "./python/bin/python" ] || { echo "错误：Python解压失败"; exit 1; }
          echo "✅ Python版本：$(./python/bin/python --version)"

      - name: 安装libaio1（修复证书验证+文件缺失）
        run: |
          set -x
          set -euo pipefail
          
          echo "=== 1. 确保universe源启用（24.04 deb822格式） ==="
          sudo apt-get install -y software-properties-common
          if ! grep -q "universe" /etc/apt/sources.list.d/ubuntu.sources; then
            sudo add-apt-repository -y universe
            sudo apt-get update -y -v || { echo "错误：apt update失败"; exit 1; }
          fi
          
          echo "=== 2. 优先apt安装（重试1次，应对临时故障） ==="
          # 重试1次，避免网络波动导致的安装不完整
          if ! sudo apt-get install -y -v libaio1; then
            echo "⚠️ 首次apt安装失败，重试1次..."
            sudo apt-get install -y -v libaio1 || echo "⚠️ 重试后apt仍失败，进入手动安装"
          fi
          
          echo "=== 3. 多重验证+手动安装fallback ==="
          LIB_AIO_DEFAULT_PATH="/lib/x86_64-linux-gnu/libaio.so.1"
          LIB_AIO_PATH=""
          
          # 先检查默认路径
          if [ -f "$LIB_AIO_DEFAULT_PATH" ]; then
            LIB_AIO_PATH="$LIB_AIO_DEFAULT_PATH"
            echo "✅ 找到libaio.so.1（默认路径）"
          else
            # 查找文件（防止路径异常）
            LIB_AIO_PATH=$(find /lib/x86_64-linux-gnu/ /usr/lib/x86_64-linux-gnu/ -name "libaio.so.1" | head -n 1)
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "❌ 未找到文件，执行手动安装（跳过证书验证）"
              
              # 关键：补充多个备用链接+wget跳过证书验证
              LIB_AIO_URLS=(
                "https://ftp.debian.org/debian/pool/main/liba/libaio/libaio1_0.3.113-5_amd64.deb"  # Debian官方主源（证书可靠）
                "https://mirrors.tuna.tsinghua.edu.cn/debian/pool/main/liba/libaio/libaio1_0.3.113-5_amd64.deb"  # 清华Debian源（国内+证书可靠）
                "http://ftp.br.debian.org/debian/pool/main/liba/libaio/libaio1_0.3.113-5_amd64.deb"  # 原链接（http避免证书问题）
              )
              
              deb_downloaded=false
              for url in "${LIB_AIO_URLS[@]}"; do
                echo "=== 尝试下载：$url ==="
                rm -f libaio1.deb
                # 添加--no-check-certificate跳过SSL验证，--no-proxy避免代理干扰
                if wget -v --no-check-certificate --no-proxy --timeout=30 "$url" -O libaio1.deb; then
                  # 校验文件有效性
                  if [ $(du -k libaio1.deb | cut -f1) -ge 10 ] && dpkg-deb --info libaio1.deb &> /dev/null; then
                    echo "✅ 手动下载成功"
                    deb_downloaded=true
                    break
                  fi
                  echo "警告：下载的deb包无效"
                  rm -f libaio1.deb
                fi
              done
              
              if [ "$deb_downloaded" = false ]; then
                echo "错误：所有手动下载链接失败"
                exit 1
              fi
              
              # 强制安装deb包
              sudo dpkg -i --force-all libaio1.deb  # --force-all忽略所有校验，确保文件释放
              if [ ! -f "$LIB_AIO_DEFAULT_PATH" ]; then
                echo "错误：手动安装后仍未找到libaio.so.1"
                exit 1
              fi
              LIB_AIO_PATH="$LIB_AIO_DEFAULT_PATH"
              echo "✅ 手动安装成功，文件路径：$LIB_AIO_PATH"
            fi
          fi
          
          echo "=== 4. 确认文件有效性+写入环境变量 ==="
          [ -r "$LIB_AIO_PATH" ] || { echo "错误：libaio.so.1不可读"; exit 1; }
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> "$GITHUB_ENV"
          grep "LIB_AIO_PATH" "$GITHUB_ENV" || { echo "错误：环境变量写入失败"; exit 1; }
          echo "✅ libaio1安装完成，路径：$LIB_AIO_PATH"

      - name: 安装Python依赖（验证dmPython）
        run: |
          set -x
          ./python/bin/python -m pip install --upgrade pip==23.3.1
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==1.5.3 flask==2.2.5 werkzeug==2.2.3 pyinstaller==5.13.2
          
          # 验证dmPython能否加载libaio
          if ! ./python/bin/python -c "import dmPython; conn = dmPython.connect(); print('dmPython连接成功')" &> /dev/null; then
            echo "错误：dmPython无法连接（libaio路径问题）"
            ldd $(find ./python -name "dmPython.*.so") | grep libaio || true  # 检查依赖关联
            exit 1
          fi
          echo "✅ dmPython验证成功（可正常连接）"

      - name: 打包应用
        run: |
          set -x
          [ -f "./main.py" ] || { echo "错误：未找到main.py"; exit 1; }
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          python_lib_path="./python/lib/python3.10/site-packages"  # 固定Python 3.10路径
          
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths="$python_lib_path" \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --add-binary="$LIB_AIO_PATH:." \
            --runtime-tmpdir=. \
            --strip \
            --no-compress \
            ./main.py
          
          [ -f "dist/myapp-linux" ] || { echo "错误：打包失败"; exit 1; }
          echo "✅ 打包完成，产物大小：$(du -h dist/myapp-linux | cut -f1)"

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}