name: 达梦API服务打包（ISO客户端+静态链接）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装基础工具（含ISO处理）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            musl-tools tree wget findutils gcc libc6-dev \
            xorriso  # ISO镜像提取工具
          # 验证工具安装
          for tool in musl-gcc tree wget find gcc xorriso; do
            if ! command -v $tool &> /dev/null; then
              echo "错误：工具[$tool]安装失败"
              exit 1
            fi
          done
          echo "✅ 基础工具安装完成"

      - name: 下载并处理达梦客户端ISO
        run: |
          # 配置路径
          DM_TAR_URL="https://github.com/2758003362/dabao/releases/download/1.2.1/dm8_20250506_x86_rh7_64.tar.gz"
          DM_TAR_FILE="dm_client.tar.gz"
          TMP_EXTRACT_DIR="/tmp/dm_extract"
          ISO_MOUNT_DIR="/mnt/dm_iso"
          DM_INSTALL_DIR="/opt/dmdbms"

          # 1. 下载tar包
          echo "下载达梦客户端tar包..."
          if ! wget --retry-connrefused --waitretry=3 --timeout=30 -t 5 \
                   "$DM_TAR_URL" -O "$DM_TAR_FILE"; then
            echo "错误：tar包下载失败"
            exit 1
          fi

          # 2. 解压tar包
          echo "解压tar包..."
          sudo mkdir -p "$TMP_EXTRACT_DIR"
          if ! sudo tar -xzf "$DM_TAR_FILE" -C "$TMP_EXTRACT_DIR"; then
            echo "错误：tar包解压失败"
            exit 1
          fi

          # 3. 查找ISO文件
          echo "查找ISO文件..."
          DM_ISO_FILE=$(find "$TMP_EXTRACT_DIR" -name "*.iso" -type f | head -n 1)
          if [ -z "$DM_ISO_FILE" ]; then
            echo "错误：未找到ISO文件，目录结构："
            tree "$TMP_EXTRACT_DIR"
            exit 1
          fi
          echo "找到ISO文件：$DM_ISO_FILE"

          # 4. 提取ISO内容
          echo "提取ISO内容..."
          sudo mkdir -p "$ISO_MOUNT_DIR"
          if ! sudo xorriso -osirrox on -indev "$DM_ISO_FILE" -extract / "$ISO_MOUNT_DIR"; then
            echo "错误：ISO提取失败"
            exit 1
          fi

          # 5. 定位客户端核心文件
          echo "定位客户端文件..."
          # 达梦客户端常见路径模式
          DM_CLIENT_DIR=$(find "$ISO_MOUNT_DIR" -type d \
            \( -name "client" \
            -o -path "*/dmdbms/client" \
            -o -path "*/opt/dmdbms/client" \) | head -n 1)

          if [ -z "$DM_CLIENT_DIR" ]; then
            echo "错误：未找到客户端目录，ISO结构："
            tree "$ISO_MOUNT_DIR" --dirsfirst | head -100
            exit 1
          fi

          # 6. 复制到安装目录
          echo "安装客户端文件..."
          sudo mkdir -p "$DM_INSTALL_DIR"
          sudo cp -r "$DM_CLIENT_DIR"/* "$DM_INSTALL_DIR/"

          # 7. 验证关键文件
          echo "验证客户端文件..."
          DM_LIB=$(find "$DM_INSTALL_DIR" -name "libdmdpi.so" | head -n 1)
          DM_HEADER=$(find "$DM_INSTALL_DIR" -name "dmdbai.h" | head -n 1)

          if [ -z "$DM_LIB" ] || [ -z "$DM_HEADER" ]; then
            echo "错误：缺少关键文件，安装目录结构："
            tree "$DM_INSTALL_DIR" --dirsfirst | head -100
            exit 1
          fi

          # 8. 设置环境变量
          DM_LIB_PATH=$(dirname "$DM_LIB")
          DM_INCLUDE_PATH=$(dirname "$DM_HEADER")
          echo "DM_HOME=$DM_INSTALL_DIR" >> $GITHUB_ENV
          echo "DM_LIB_PATH=$DM_LIB_PATH" >> $GITHUB_ENV
          echo "DM_INCLUDE_PATH=$DM_INCLUDE_PATH" >> $GITHUB_ENV
          echo "✅ 达梦客户端安装完成"
          echo "库路径: $DM_LIB_PATH"
          echo "头文件路径: $DM_INCLUDE_PATH"

      - name: 配置静态Python 3.11
        run: |
          PYTHON_TAR="cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz"
          PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20240224/$PYTHON_TAR"
          EXPECTED_SHA256="08e1ebf51b5965e23f8e68664d17274c1cdabb5b2d7509a2003920e5d58172c7"
          
          wget "$PYTHON_URL" -O "$PYTHON_TAR"
          if [ "$(sha256sum "$PYTHON_TAR" | awk '{print $1}')" != "$EXPECTED_SHA256" ]; then
            echo "错误：Python SHA256不匹配"
            exit 1
          fi
          
          mkdir -p "$GITHUB_WORKSPACE/python-musl"
          tar -xzvf "$PYTHON_TAR" -C "$GITHUB_WORKSPACE/python-musl"
          
          PYTHON_BIN=$(find "$GITHUB_WORKSPACE/python-musl" -name "python3.11" -type f -executable | head -n 1)
          if [ -z "$PYTHON_BIN" ]; then
            PYTHON_BIN=$(find "$GITHUB_WORKSPACE/python-musl" -name "python3" -type f -executable | head -n 1)
            if [[ -z "$PYTHON_BIN" || ! "$($PYTHON_BIN --version 2>&1)" =~ "3.11" ]]; then
              echo "错误：未找到Python 3.11"
              exit 1
            fi
          fi
          PYTHON_BIN=$(realpath "$PYTHON_BIN")
          
          PYTHON_INCLUDE=$(realpath "$(dirname "$PYTHON_BIN")/../include/python3.11")
          PYTHON_LIB=$(realpath "$(dirname "$PYTHON_BIN")/../lib/python3.11")
          if [ ! -d "$PYTHON_INCLUDE" ] || [ ! -d "$PYTHON_LIB" ]; then
            echo "错误：Python头文件/库目录不存在"
            exit 1
          fi
          
          echo "PYTHON_BIN=$PYTHON_BIN" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$PYTHON_INCLUDE" >> $GITHUB_ENV
          echo "PYTHON_LIB=$PYTHON_LIB" >> $GITHUB_ENV
          echo "✅ Python 3.11配置完成"

      - name: 编译静态libaio
        run: |
          wget https://pagure.io/libaio/archive/libaio-0.3.113/libaio-libaio-0.3.113.tar.gz
          tar -xzf libaio-libaio-0.3.113.tar.gz && cd libaio-libaio-0.3.113
          
          sed -i.bak "s|^CC\s*=.*$|CC = musl-gcc|" src/Makefile
          sed -i "s|^CFLAGS\s*=.*$|CFLAGS = -fPIC -static -I/usr/include -D_GNU_SOURCE -Wall|" src/Makefile
          sed -i "s|^LDFLAGS\s*=.*$|LDFLAGS = -static|" src/Makefile
          
          find src/ -name "*.c" -exec sed -i -e '/#include <bits\/wordsize.h>/d' -e '1i #define __WORDSIZE 64' {} \;
          
          sudo cp src/libaio.h /usr/include/
          make V=1
          LIB_AIO_SO=$(find src/ -name "libaio.so.*" | sort -V | tail -n 1)
          sudo cp "$LIB_AIO_SO" /usr/lib/x86_64-linux-gnu/
          sudo ln -sf "$(basename "$LIB_AIO_SO")" /usr/lib/x86_64-linux-gnu/libaio.so.1
          
          echo "LIB_AIO_PATH=/usr/lib/x86_64-linux-gnu/libaio.so.1" >> $GITHUB_ENV
          echo "✅ libaio编译完成"
          cd ..

      - name: 编译安装dmPython
        run: |
          # 读取环境变量
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          PYTHON_INCLUDE="${{ env.PYTHON_INCLUDE }}"
          PYTHON_LIB="${{ env.PYTHON_LIB }}"
          DM_HOME="${{ env.DM_HOME }}"
          DM_LIB_PATH="${{ env.DM_LIB_PATH }}"
          DM_INCLUDE_PATH="${{ env.DM_INCLUDE_PATH }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          
          # 验证依赖
          for path in "$PYTHON_BIN" "$DM_INCLUDE_PATH" "$DM_LIB_PATH" "$LIB_AIO_PATH"; do
            if [ ! -e "$path" ]; then
              echo "错误：依赖路径[$path]无效"
              exit 1
            fi
          done
          
          # 升级pip
          "$PYTHON_BIN" -m pip install pip==25.2 -i https://pypi.org/simple/
          
          # 下载并编译dmPython
          DM_PYTHON_SRC_URL="https://raw.githubusercontent.com/2758003362/dabao/master/dmPython.tar.gz"
          wget "$DM_PYTHON_SRC_URL" -O "dmPython.tar.gz"
          mkdir -p dmPython-src && tar -xzf dmPython.tar.gz -C dmPython-src --strip-components=1
          cd dmPython-src
          
          echo "编译dmPython..."
          CC="musl-gcc" \
          CFLAGS="-I$PYTHON_INCLUDE -I$DM_INCLUDE_PATH -fPIC -DDM_USE_AIO=1" \
          LDFLAGS="-L$PYTHON_LIB -L$DM_LIB_PATH -L/usr/lib/x86_64-linux-gnu -ldmdpi -laio -static" \
          "$PYTHON_BIN" setup.py install --dm-home="$DM_HOME"
          
          cd ..
          
          # 验证安装
          if ! "$PYTHON_BIN" -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython安装失败，详细错误："
            "$PYTHON_BIN" -c "import dmPython" 2>&1
            exit 1
          fi
          DM_VERSION=$("$PYTHON_BIN" -c 'import dmPython; print(f"dmPython版本：{dmPython.__version__}")')
          echo "✅ $DM_VERSION 安装完成"

      - name: 安装其他依赖
        run: |
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          "$PYTHON_BIN" -m pip install \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0 \
            --no-cache-dir \
            -i https://pypi.org/simple/
          
          for lib in dmPython pandas flask werkzeug; do
            if ! "$PYTHON_BIN" -c "import $lib" &> /dev/null; then
              echo "错误：[$lib]导入失败"
              exit 1
            fi
          done
          echo "✅ 所有依赖安装完成"

      - name: 静态打包应用
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到main.py"
            exit 1
          fi
          
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          DM_LIB_PATH="${{ env.DM_LIB_PATH }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          
          "$PYTHON_BIN" -m PyInstaller --onefile --name myapp-linux \
            --paths="$PYTHON_BIN/../lib/python3.11/site-packages" \
            --paths="$DM_LIB_PATH" \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=dmPython._dmPython \
            --add-binary="$DM_LIB_PATH/libdmdpi.so:." \
            --add-binary="$LIB_AIO_PATH:." \
            --noupx \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          
          echo "产物信息："
          file dist/myapp-linux
          echo "✅ 打包完成"

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-musl-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-musl-static

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
          name: "v${{ github.ref_name }}（静态版）"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
