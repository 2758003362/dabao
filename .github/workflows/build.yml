name: Linux 应用打包

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-21.04  # 目标系统匹配的版本
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包
        run: pyinstaller --onefile --name myapp-linux main.py

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-linux
          path: dist/myapp-linux

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: 下载 Linux 产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-linux

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
