name: 快速构建（兼容 GLIBC 2.31）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest  # 用最新版，避免排队
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载并配置静态编译的 Python
        run: |
          # 下载独立于系统的 Python 版本
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # 解压文件
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # 灵活获取解压后的文件夹名称并创建软链接，避免名称匹配问题
          PYTHON_DIR=$(find . -maxdepth 1 -type d -name "cpython-3.11.8+*" | head -n 1)
          ln -s "$PYTHON_DIR" python
          
          # 验证Python是否可用
          ./python/bin/python --version

      - name: 安装依赖和 pyinstaller
        run: |
          # 使用静态 Python 安装，避免依赖系统库
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install -r requirements.txt
          ./python/bin/python -m pip install pyinstaller

      - name: 用静态 Python 打包
        run: |
          # 指定使用静态 Python 执行 pyinstaller
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            main.py

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
