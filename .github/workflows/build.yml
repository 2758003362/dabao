name: 达梦API服务打包（兼容GLIBC 2.31 + 避免排队）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境（兼容GLIBC 2.31）
        run: |
          wget https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ 静态Python配置完成，版本：$(./python/bin/python --version)"

      - name: 安装libaio1（系统包管理器强制安装）
        run: |
          echo "配置多镜像源提高成功率..."
          echo "deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb http://security.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb http://mirrors.aliyun.com/ubuntu/ jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          
          echo "更新源列表..."
          sudo apt-get update -qq || echo "⚠️ 部分源更新失败，继续尝试安装"
          
          echo "强制安装libaio1..."
          if ! sudo apt-get install -y --force-yes --allow-unauthenticated libaio1; then
            echo "错误：系统包管理器安装libaio1失败"
            cat /var/log/apt/history.log | tail -n 30
            exit 1
          fi
          
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装后验证失败"
            exit 1
          fi
          
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功"

      - name: 获取低版本libstdc++（Ubuntu 20.04 原始版本，确保可用）
        run: |
          echo "下载Ubuntu 20.04原始版本libstdc++（9.3.0-10ubuntu2，长期归档版本）..."
          # 该版本是Ubuntu 20.04初始发布版本，在old-releases中永久保留
          LIBSTDCPP_URLS=(
            "http://old-releases.ubuntu.com/ubuntu/pool/main/g/gcc-9/libstdc++6_9.3.0-10ubuntu2_amd64.deb"
            "https://mirrors.nju.edu.cn/ubuntu/pool/main/g/gcc-9/libstdc++6_9.3.0-10ubuntu2_amd64.deb"  # 南京大学镜像（旧包归档完整）
            "https://mirror.bit.edu.cn/ubuntu/pool/main/g/gcc-9/libstdc++6_9.3.0-10ubuntu2_amd64.deb"   # 北京理工大学镜像
            "https://mirrors.hit.edu.cn/ubuntu/pool/main/g/gcc-9/libstdc++6_9.3.0-10ubuntu2_amd64.deb"   # 哈尔滨工业大学镜像
          )
          
          # 循环尝试所有源，增加超时和重试次数
          for url in "${LIBSTDCPP_URLS[@]}"; do
            echo "尝试从 $url 下载..."
            if wget --timeout=20 --tries=5 "$url" -O libstdc++6.deb; then
              # 严格验证deb包完整性
              if dpkg-deb -I libstdc++6.deb &> /dev/null; then
                echo "✅ 下载并验证成功"
                break
              else
                echo "⚠️ 无效的deb包，删除后重试..."
                rm -f libstdc++6.deb
              fi
            fi
          done
          
          # 最终检查，若仍失败则提示手动干预
          if [ ! -f "libstdc++6.deb" ]; then
            echo "错误：所有源均下载失败，请手动下载以下包并放入项目根目录："
            echo "http://old-releases.ubuntu.com/ubuntu/pool/main/g/gcc-9/libstdc++6_9.3.0-10ubuntu2_amd64.deb"
            exit 1
          fi
          
          mkdir -p libstdc++
          dpkg-deb -x libstdc++6.deb libstdc++
          LOW_GLIBC_LIBSTDCPP_PATH=$(find ./libstdc++ -name "libstdc++.so.6" | head -n 1)
          
          if [ -z "$LOW_GLIBC_LIBSTDCPP_PATH" ] || [ ! -f "$LOW_GLIBC_LIBSTDCPP_PATH" ]; then
            echo "错误：未找到低版本libstdc++.so.6"
            exit 1
          fi
          
          echo "LOW_GLIBC_LIBSTDCPP_PATH=$LOW_GLIBC_LIBSTDCPP_PATH" >> $GITHUB_ENV
          echo "✅ 低版本libstdc++准备完成"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install dmPython==2.5.20 pandas==1.5.3 flask==2.2.3 werkzeug==2.2.3 pyinstaller==5.13.0
          
          if ./python/bin/python -c "import dmPython" &> /dev/null; then
            echo "✅ dmPython安装成功"
          else
            echo "错误：dmPython安装失败"
            exit 1
          fi

      - name: 打包应用
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          LOW_GLIBC_LIBSTDCPP_PATH="${{ env.LOW_GLIBC_LIBSTDCPP_PATH }}"
          
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --add-binary="$LOW_GLIBC_LIBSTDCPP_PATH:." \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          
          echo "检查GLIBC依赖："
          objdump -T dist/myapp-linux | grep -E "GLIBC_2.33|GLIBC_2.34|GLIBC_2.35|GLIBC_2.38" || echo "✅ 未发现高版本依赖"

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
