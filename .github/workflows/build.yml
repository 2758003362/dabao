name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置低GLIBC兼容的静态Python环境
        run: |
          # 更新为可用的Python版本链接，兼容GLIBC 2.17+
          # 主链接使用最新可用的兼容版本
          PYTHON_URLS=(
            "https://github.com/astral-sh/python-build-standalone/releases/download/20231002/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz"
            "https://github.com/astral-sh/python-build-standalone/releases/download/20230507/cpython-3.11.3+20230507-x86_64-unknown-linux-gnu-install_only.tar.gz"
            "https://github.com/astral-sh/python-build-standalone/releases/download/20230427/cpython-3.10.11+20230427-x86_64-unknown-linux-gnu-install_only.tar.gz"
          )
          
          # 尝试从多个链接下载，确保成功
          for url in "${PYTHON_URLS[@]}"; do
            filename=$(basename "$url")
            echo "尝试下载: $url"
            if wget -q "$url" -O "$filename"; then
              echo "✅ Python压缩包下载成功: $filename"
              break
            fi
          done
          
          # 检查是否下载成功
          if [ -z "$filename" ] || [ ! -f "$filename" ]; then
            echo "错误：所有Python压缩包下载链接均失效"
            exit 1
          fi
          
          # 解压Python
          mkdir -p python
          tar -xzf "$filename" -C python --strip-components=1
          
          # 验证Python是否可用
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ 静态Python配置完成，版本：$(./python/bin/python --version)"
          
          # 验证Python的GLIBC依赖
          echo "Python的GLIBC依赖检查："
          ldd ./python/bin/python | grep libc || true

      - name: 安装libaio1并验证版本兼容性
        run: |
          LIB_AIO_URLS=(
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "https://mirrors.aliyun.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
          )
          
          for url in "${LIB_AIO_URLS[@]}"; do
            echo "尝试从 $url 下载libaio1..."
            if wget -q "$url" -O libaio1.deb; then
              echo "✅ 下载成功"
              break
            fi
          done
          
          if [ ! -f "libaio1.deb" ]; then
            echo "错误：所有源均下载失败"
            exit 1
          fi
          
          sudo dpkg -i --force-depends libaio1.deb
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装失败"
            exit 1
          fi
          
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "获取到的libaio路径：[$LIB_AIO_PATH]"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：获取的libaio路径无效"
            ls -la /lib/x86_64-linux-gnu/ | grep libaio
            exit 1
          fi
          
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功"

      - name: 安装兼容低GLIBC的Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install \
            dmPython==2.5.22 \
            pandas==1.5.3 \
            flask==2.2.5 \
            werkzeug==2.2.3 \
            pyinstaller==5.13.2
          
          echo "检查dmPython的依赖："
          ldd $(find ./python -name "dmPython.*.so") | grep libc || true
          
          if ./python/bin/python -c "import dmPython; import pandas; import flask" &> /dev/null; then
            echo "✅ 所有核心依赖安装成功"
          else
            echo "错误：依赖安装失败"
            exit 1
          fi

      - name: 打包应用（强制低GLIBC兼容）
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          echo "使用libaio路径：$LIB_AIO_PATH"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "警告：环境变量路径无效，尝试重新获取..."
            LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "错误：重新获取路径仍无效"
              exit 1
            fi
          fi
          
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --runtime-tmpdir=. \
            --strip \
            --exclude-module=ctypes \
            --exclude-module=distutils \
            --no-compress \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败，未生成产物"
            exit 1
          fi
          
          echo "==== 产物GLIBC依赖检查 ===="
          objdump -T dist/myapp-linux | grep GLIBC_ | sort -u | grep -v GLIBC_2.3[2-9] | grep -v GLIBC_2.[4-9]
          echo "=========================="
          
          if objdump -T dist/myapp-linux | grep GLIBC_ | sort -u | grep -q -E 'GLIBC_2.3[2-9]|GLIBC_2.[4-9]'; then
            echo "警告：检测到高于GLIBC 2.31的依赖"
            objdump -T dist/myapp-linux | grep GLIBC_ | sort -u | grep -E 'GLIBC_2.3[2-9]|GLIBC_2.[4-9]'
          else
            echo "✅ 未检测到高于GLIBC 2.31的依赖"
          fi
          
          echo "✅ 打包完成"
          ls -lh dist/myapp-linux

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
