name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    # 使用Ubuntu 20.04作为构建环境，它默认使用GLIBC 2.31
    runs-on: ubuntu-20.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          # 使用与GLIBC 2.31兼容的Python版本
          wget https://github.com/indygreg/python-build-standalone/releases/download/20231002/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzf cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ 静态Python配置完成，版本：$(./python/bin/python --version)"

      - name: 安装libaio1（适配Ubuntu 20.04）
        run: |
          # 适配Ubuntu 20.04的libaio1源
          LIB_AIO_URLS=(
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.112-7ubuntu0.1_amd64.deb"
            "https://mirrors.aliyun.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.112-7ubuntu0.1_amd64.deb"
            "http://mirrors.163.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.112-7ubuntu0.1_amd64.deb"
          )
          
          for url in "${LIB_AIO_URLS[@]}"; do
            echo "尝试从 $url 下载libaio1..."
            if wget -q "$url" -O libaio1.deb; then
              echo "✅ 下载成功"
              break
            fi
          done
          
          if [ ! -f "libaio1.deb" ]; then
            echo "错误：所有源均下载失败"
            exit 1
          fi
          
          # 安装libaio1
          sudo dpkg -i --force-depends libaio1.deb
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装失败"
            exit 1
          fi
          
          # 获取并验证libaio.so.1路径
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "获取到的libaio路径：[$LIB_AIO_PATH]"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：获取的libaio路径无效"
            ls -la /lib/x86_64-linux-gnu/ | grep libaio
            exit 1
          fi
          
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          # 确保依赖版本兼容旧版GLIBC
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==2.1.4 flask==2.3.3 werkzeug==2.3.7 pyinstaller==6.16.0
          
          # 验证dmPython安装
          if ./python/bin/python -c "import dmPython" &> /dev/null; then
            echo "✅ dmPython安装成功"
          else
            echo "错误：dmPython安装失败"
            exit 1
          fi
          echo "✅ 所有依赖安装完成"

      - name: 打包应用（兼容GLIBC 2.31）
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          echo "使用libaio路径：$LIB_AIO_PATH"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "警告：环境变量路径无效，尝试重新获取..."
            LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "错误：重新获取路径仍无效"
              exit 1
            fi
          fi
          
          # 关键：使用--strip参数减小体积并避免不必要的符号依赖
          # 添加--exclude-module参数排除可能引入高版本GLIBC依赖的模块
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --runtime-tmpdir=. \
            --strip \
            --exclude-module=pycparser \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败，未生成产物"
            exit 1
          fi
          
          # 检查GLIBC依赖
          echo "检查产物的GLIBC依赖："
          ldd dist/myapp-linux | grep libc || true
          
          echo "✅ 打包完成"
          ls -lh dist/myapp-linux

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-20.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
