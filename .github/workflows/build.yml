name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境（修复版）
        run: |
          # 1. 清理可能存在的旧文件
          rm -rf python cpython-*.tar.gz
          
          # 2. 使用更可靠的下载方式
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20230726/cpython-3.10.12+20230726-x86_64-unknown-linux-gnu-install_only.tar.gz"
          
          # 带重试机制的下载
          for i in {1..3}; do
            echo "尝试第$i次下载Python包..."
            if wget --tries=3 --timeout=30 "$PYTHON_URL"; then
              echo "✅ Python包下载成功"
              break
            else
              echo "⚠️ 下载失败，等待5秒后重试..."
              sleep 5
            fi
            if [ $i -eq 3 ]; then
              echo "❌ 错误：Python压缩包下载失败（3次重试均失败）"
              exit 1
            fi
          done
          
          # 3. 验证下载文件完整性
          if [ ! -f "cpython-3.10.12+20230726-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "❌ 错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 检查文件大小（应≈26.4MB）
          FILE_SIZE=$(wc -c < "cpython-3.10.12+20230726-x86_64-unknown-linux-gnu-install_only.tar.gz")
          echo "下载文件大小: $FILE_SIZE 字节"
          if [ "$FILE_SIZE" -lt 25000000 ]; then
            echo "❌ 错误：下载文件不完整（大小: $FILE_SIZE）"
            exit 1
          fi
          
          # 4. 使用更健壮的解压命令
          mkdir -p python
          echo "极速下载解压Python包..."
          if ! tar -xzf cpython-3.10.12+20230726-x86_64-unknown-linux-gnu-install_only.tar.gz \
               -C python \
               --strip-components=1 \
               --exclude='__pycache__' \
               --极速下载='*.pyc'; then
            echo "❌ 错误：Python解压失败，可能原因："
            echo "1. 下载文件损坏"
            echo "2. 磁盘空间不足（当前剩余: $(df -h . | awk 'NR==2{print $4}')）"
            echo "3. 权限问题（当前用户: $(whoami)）"
            exit 1
          fi
          
          # 5. 双重验证解压结果 - 修复：检查正确的可执行文件名
          if [ ! -f "./python/bin/python3.10" ]; then
            echo "❌ 错误：Python可执行文件不存在"
            echo "解压目录内容："
            ls -la python/bin/
            exit 1
          fi
          
          # 6. 创建python符号链接以便后续使用
          cd python/bin
          ln -sf python3.10 python
          cd ../..
          
          echo "✅ Python配置成功，版本：$(./python/bin/python --version)"

      - name: 安装libaio1（写入环境变量，跨步骤共享）
        run: |
          # 多源下载libaio1.deb（确保成功）
          LIB_AIO_URLS=(
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "https://mirrors.aliyun.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "http://mirrors.163.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
          )
          
          for url in "${LIB极速下载_URLS[@]}"; do
            echo "尝试从 $url 下载libaio1..."
            if wget -q "$url" -O libaio1.deb; then
              echo "✅ 下载成功"
              break
            fi
          done
          
          if [ ! -f "libaio1.deb" ]; then
            echo "错误：所有源均下载失败"
            exit 1
          fi
          
          # 强制安装（适配Ubuntu 24.04）
          sudo dpkg -i --force-depends libaio1.deb
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装失败"
            exit 1
          fi
          
          # 关键：获取并验证libaio.so.1路径，写入环境变量
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "获取到的libaio路径：[$LIB_AIO_PATH]"  # 括号显示是否有隐藏字符
          
          # 双重验证路径有效性
          if [ -z "$LIB_AIO_PATH极速下载" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：获取的libaio路径无效（文件不存在）"
            # 辅助排查：打印系统中的libaio文件
            ls -la /lib/x86_64-linux-gnu/ | grep libaio
            exit 1
          fi
          
          # 写入GitHub环境变量，供后续步骤使用
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功，路径已写入环境变量"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          # 固定依赖版本，避免兼容性问题
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==2.1.4 flask==2.3.3 werkzeug==2.3.7 pyinstaller==6.16.0
          
          # 验证dmPython能否正常导入（核心依赖）
          if ./python/bin/python -c "import dmPython" &> /dev/null; then
            echo "✅ dmPython安装成功"
          else
            echo "错误：dmPython安装失败（可能是libaio依赖问题）"
            exit 1
          fi
          echo "✅ 所有依赖安装完成"

      - name: 准备兼容的libstdc++
        run: |
          # 下载兼容GLIBC 2.31的libstdc++6
          wget -q https://mirrors.aliyun.com/ubuntu/pool/main/g/gcc-12/libstdc++6_12.3.0-1ubuntu1_amd64.deb
          if [ ! -f "libstdc++6_12.3.0-1ubuntu1_amd64.deb" ]; then
            echo "错误：libstdc++6下载失败"
            exit 1
          fi
          
          # 解压deb包获取libstdc++.so.6
          ar x libstdc++6_12.3.0-1ubuntu1_amd64.deb data.tar.xz
          tar -xf data.tar.xz ./usr/lib/x86_64-linux-gnu/libstdc++.so.6
          
          if [ ! -f "./usr/lib/x86_64-linux-gnu/libstdc++.so.6" ]; then
            echo "错误：libstdc++.so.6提取失败"
            exit 1
          fi
          
          # 验证libstdc++版本兼容性
          echo "libstdc++.so.6 GLIBC要求："
          objdump -p ./usr/lib/x86_64-linux-gnu/libstdc++.极速下载so.6 | grep -A 10 "Version References:" || true
          
          echo "✅ 兼容的libstdc++.so.6准备完成"

      - name: 打包应用（兼容GLIBC 2.31）
        run: |
          # 验证入口脚本存在
          echo "当前目录文件列表："
          ls -la
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          echo "✅ 确认main.py存在"
          
          # 从环境变量获取libaio路径，带fallback机制
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          echo "从环境变量获取的libaio路径：[$LIB_AIO_PATH]"
          
          # 二次验证，防止环境变量传递失败
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "警告：环境变量路径无效，尝试重新获取..."
            # 重新获取路径作为fallback
            LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "错误：重新获取路径仍无效"
              exit 1
            fi
            echo "fallback成功，路径：$LIB_AIO_PATH"
          fi
          
          # 设置链接器选项，解决memcpy/memmove符号问题
          export LDFLAGS="-Wl,--wrap=memcpy -Wl,--wrap=memmove"
          echo "设置链接器选项：$LDFLAGS"
          
          # 执行打包（携带所有依赖和兼容的libstdc++）
          echo "开始打包，使用libaio路径：$LIB_AIO_PATH"
          ./python/bin/python -m PyInstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.10/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --add-binary="./usr/lib/x86_64-linux-gnu/libstdc++.so.6:." \
            --runtime-tmpdir=. \
            --strip \
            --noconfirm \
            ./main.py
          
          # 验证打包产物
          if [ ! -f "dist/myapp-linux极速下载" ]; then
            echo "错误：打包失败，未生成产物"
            exit 1
          fi
          
          # 检查产物的GLIBC依赖
          echo "检查产物的GLIBC依赖："
          objdump -p dist/myapp-linux | grep -A 10 "Version References:" || true
          
          echo "✅ 打包完成，产物信息："
          ls -lh dist/myapp-linux  # 打印产物大小和权限

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}