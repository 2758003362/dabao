name: 达梦API服务打包（兼容GLIBC 2.31）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境（兼容GLIBC 2.31）
        run: |
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          ./python/bin/python --version

      - name: 直接通过系统包管理器安装libaio1（最可靠方式）
        run: |
          # 更新包索引
          sudo apt-get update -y
          
          # 直接安装libaio1（系统会自动选择可用版本，确保包含libaio.so.1）
          if ! sudo apt-get install -y libaio1; then
            echo "错误：系统包管理器安装libaio1失败"
            exit 1
          fi
          
          # 验证libaio.so.1是否存在
          if ! ldconfig -p | grep -q "libaio.so.1"; then
            echo "错误：安装后未找到libaio.so.1"
            exit 1
          fi
          
          # 显示安装路径，确认存在
          echo "✅ libaio1安装成功，路径：$(ldconfig -p | grep "libaio.so.1" | awk '{print $4}')"

      - name: 安装Python依赖（含dmPython）
        run: |
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install \
            dmPython==2.5.1 \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0

      - name: 打包Linux可执行程序（携带libaio.so.1）
        run: |
          # 找到libaio.so.1的实际路径
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | awk '{print $4}')
          
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \  # 携带系统安装的libaio库
            main.py

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载打包产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
