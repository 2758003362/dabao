name: 多平台 Python 应用打包

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: 在 ${{ matrix.os }} 上构建
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 关键修改：使用 Ubuntu 18.04
        os: [ubuntu-18.04, windows-latest, macos-latest]

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 注意：Python 3.11 在 Ubuntu 18.04 上需要额外依赖
          cache: 'pip'

      # Ubuntu 18.04 额外步骤：安装 Python 3.11 所需的系统依赖
      - name: 安装系统依赖（Ubuntu 18.04）
        if: matrix.os == 'ubuntu-18.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt-get update
          sudo apt-get install -y python3.11-dev python3.11-distutils

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 执行打包操作
        run: |
          base_command="pyinstaller --onefile --name myapp"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            $base_command-windows main.py
          elif [ "${{ matrix.os }}" = "ubuntu-18.04" ]; then
            $base_command-linux main.py
          else
            $base_command-macos main.py
          fi
        shell: bash

      - name: 保存构建产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-${{ matrix.os }}
          path: dist/*
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载全部工件
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all_artifacts/myapp-ubuntu-18.04/myapp-linux
            all_artifacts/myapp-windows-latest/myapp-windows.exe
            all_artifacts/myapp-macos-latest/myapp-macos
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
