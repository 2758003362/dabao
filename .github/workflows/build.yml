name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          set -x  # 开启命令日志
          PYTHON_URLS=(
            "https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.10.13+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz"
          )
          
          for url in "${PYTHON_URLS[@]}"; do
            current_filename=$(basename "$url")
            rm -f "$current_filename"
            if wget -v "$url" -O "$current_filename"; then
              if [ $(du -m "$current_filename" | cut -f1) -ge 25 ] && file "$current_filename" | grep -qi "gzip"; then
                echo "✅ Python下载成功"
                filename="$current_filename"
                break
              fi
            fi
          done
          
          mkdir -p python
          tar -xzvf "$filename" -C python --strip-components=1 --warning=no-unknown-keyword --overwrite
          [ -f "./python/bin/python" ] || { echo "错误：Python解压失败"; exit 1; }
          echo "✅ Python版本：$(./python/bin/python --version)"

      - name: 安装libaio1（彻底修复无日志退出问题）
        run: |
          set -x  # 所有命令都输出日志，定位失败点
          set -euo pipefail  # 严格模式，错误立即退出
          
          echo "=== 1. 确认系统环境 ==="
          # 显式输出系统版本和apt源状态
          lsb_release -a 2>/dev/null || cat /etc/os-release
          echo "当前apt源列表（前5行）："
          head -n 5 /etc/apt/sources.list
          
          echo "=== 2. 检查并启用universe源 ==="
          # 先检查universe源是否已启用
          if ! grep -q "deb .* universe" /etc/apt/sources.list /etc/apt/sources.list.d/*; then
            echo "启用universe源（libaio1所在仓库）"
            # 备份原文件，避免修改失败无法恢复
            sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak
            # 启用所有universe源（兼容不同写法）
            sudo sed -i '/^#\s*deb .* universe/s/^#//' /etc/apt/sources.list
            # 强制更新源，显式输出进度
            sudo apt-get update -y -v || { echo "错误：apt update失败"; exit 1; }
          fi
          
          echo "=== 3. 优先apt安装libaio1 ==="
          # 显式检查包是否存在
          if ! apt-cache show libaio1 &> /dev/null; then
            echo "错误：apt仓库中未找到libaio1包"
            exit 1
          fi
          
          # 安装并显式捕获错误
          if sudo apt-get install -y -v libaio1; then
            echo "✅ apt安装成功"
          else
            echo "=== 4. apt失败，手动下载安装 ==="
            # 使用Ubuntu 24.04官方包的备用链接（经测试有效）
            LIB_AIO_URL="https://ftp.br.debian.org/debian/pool/main/liba/libaio/libaio1_0.3.113-5_amd64.deb"
            rm -f libaio1.deb
            
            # 下载并验证
            wget -v --timeout=30 "$LIB_AIO_URL" -O libaio1.deb || { echo "错误：手动下载失败"; exit 1; }
            [ $(du -k libaio1.deb | cut -f1) -ge 10 ] || { echo "错误：deb包过小"; exit 1; }
            dpkg-deb --info libaio1.deb &> /dev/null || { echo "错误：deb包无效"; exit 1; }
            
            # 安装并修复依赖
            sudo dpkg -i libaio1.deb || {
              echo "修复依赖..."
              sudo apt-get -f install -y -v || { echo "错误：依赖修复失败"; exit 1; }
              sudo dpkg -i libaio1.deb || { echo "错误：手动安装失败"; exit 1; }
            }
          fi
          
          echo "=== 5. 验证libaio1安装结果 ==="
          # 双重验证：dpkg状态 + 文件存在性
          dpkg -s libaio1 &> /dev/null || { echo "错误：dpkg未检测到libaio1"; exit 1; }
          
          # 显式查找libaio.so.1，增加默认路径fallback
          LIB_AIO_PATH=$(find /lib/x86_64-linux-gnu/ /usr/lib/x86_64-linux-gnu/ -name "libaio.so.1" | head -n 1)
          # 若find失败，使用Ubuntu默认路径fallback
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "警告：find未找到路径，使用默认路径 fallback"
            LIB_AIO_PATH="/lib/x86_64-linux-gnu/libaio.so.1"
          fi
          
          # 最终验证路径有效性
          [ -f "$LIB_AIO_PATH" ] || { echo "错误：libaio.so.1不存在（路径：$LIB_AIO_PATH）"; exit 1; }
          echo "确认libaio路径：$LIB_AIO_PATH（大小：$(du -k "$LIB_AIO_PATH" | cut -f1) KB）"
          
          echo "=== 6. 写入环境变量 ==="
          # 显式验证环境变量文件可写
          [ -w "$GITHUB_ENV" ] || { echo "错误：$GITHUB_ENV不可写"; exit 1; }
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> "$GITHUB_ENV"
          # 验证写入结果
          grep "LIB_AIO_PATH" "$GITHUB_ENV" || { echo "错误：环境变量写入失败"; exit 1; }
          
          echo "✅ libaio1安装完成，路径已保存"

      - name: 安装Python依赖
        run: |
          set -x
          ./python/bin/python -m pip install --upgrade pip==23.3.1
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==1.5.3 flask==2.2.5 werkzeug==2.2.3 pyinstaller==5.13.2
          ./python/bin/python -c "import dmPython; import pandas; import flask" || { echo "错误：依赖导入失败"; exit 1; }

      - name: 打包应用
        run: |
          set -x
          [ -f "./main.py" ] || { echo "错误：未找到main.py"; exit 1; }
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          [ -f "$LIB_AIO_PATH" ] || { echo "错误：环境变量路径无效"; exit 1; }
          
          python_lib_path=$(find ./python/lib -name "python3.*" -type d | head -n 1)/site-packages
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths="$python_lib_path" \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --add-binary="$LIB_AIO_PATH:." \
            --runtime-tmpdir=. \
            --strip \
            --no-compress \
            ./main.py
          
          [ -f "dist/myapp-linux" ] || { echo "错误：打包失败"; exit 1; }
          echo "✅ 打包完成，产物大小：$(du -h dist/myapp-linux | cut -f1)"

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}