name: 达梦API服务打包（musl静态链接，全Linux兼容）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest  # 基于最新Ubuntu构建
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装基础工具（musl+编译依赖）
        run: |
          sudo apt-get update -y
          # 安装核心工具：musl编译器、目录查看、下载工具
          sudo apt-get install -y musl-tools tree wget findutils
          # 验证工具安装
          for tool in musl-gcc tree wget find; do
            if ! command -v $tool &> /dev/null; then
              echo "错误：工具[$tool]安装失败"
              exit 1
            fi
          done
          echo "✅ 基础工具安装完成"

      - name: 配置静态Python（musl版，适配python3命名）
        run: |
          # 1. 定义Python版本（确认存在的musl静态版）
          PYTHON_TAR="cpython-3.10.12+20230726-x86_64-unknown-linux-musl-install_only.tar.gz"
          PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20230726/$PYTHON_TAR"
          EXPECTED_SHA256="9080014bee2d4bd1f96bcbebf447d40c35ae9354382246add1160bd0d433ebf7"
          
          # 2. 下载Python（带重试和超时）
          echo "开始下载静态Python: $PYTHON_URL"
          if ! wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 5 \
                   "$PYTHON_URL" -O "$PYTHON_TAR"; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 3. 校验压缩包完整性
          echo "校验Python压缩包SHA256..."
          ACTUAL_SHA256=$(sha256sum "$PYTHON_TAR" | awk '{print $1}')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "错误：Python压缩包损坏（实际:$ACTUAL_SHA256 预期:$EXPECTED_SHA256）"
            exit 1
          fi
          
          # 4. 解压（保留原始目录结构）
          mkdir -p python-musl
          echo "解压Python压缩包..."
          if ! tar -xzvf "$PYTHON_TAR" -C python-musl; then
            echo "错误：Python解压失败"
            exit 1
          fi
          
          # 5. 查找Python可执行文件（适配python3命名）
          echo "=== 查找Python可执行文件 ==="
          ALL_PYTHON_FILES=$(find python-musl -name "python*" -type f | sort)
          if [ -n "$ALL_PYTHON_FILES" ]; then
            echo "找到的Python相关文件："
            echo "$ALL_PYTHON_FILES"
          fi
          
          # 优先选择bin目录下的python3（标准命名）
          PYTHON_BIN=$(echo "$ALL_PYTHON_FILES" | grep "/bin/python3\(\.[0-9]\+\)\?$" | head -n 1)
          # 容错：若未找到python3，尝试python
          if [ -z "$PYTHON_BIN" ] || [ ! -f "$PYTHON_BIN" ]; then
            PYTHON_BIN=$(echo "$ALL_PYTHON_FILES" | grep "/bin/python$" | head -n 1)
          fi
          # 最终容错：选择第一个找到的文件
          if [ -z "$PYTHON_BIN" ] || [ ! -f "$PYTHON_BIN" ]; then
            echo "警告：未找到标准路径Python，尝试第一个匹配文件"
            PYTHON_BIN=$(echo "$ALL_PYTHON_FILES" | head -n 1)
          fi
          
          # 6. 验证Python有效性
          if [ -z "$PYTHON_BIN" ] || [ ! -f "$PYTHON_BIN" ]; then
            echo "错误：未找到Python可执行文件"
            tree python-musl  # 打印目录结构辅助排查
            exit 1
          fi
          # 验证可执行性
          if ! "$PYTHON_BIN" --version &> /dev/null; then
            echo "错误：[$PYTHON_BIN]无法执行（不是有效Python）"
            exit 1
          fi
          # 验证静态链接
          if ! file "$PYTHON_BIN" | grep -q "statically linked"; then
            echo "错误：Python不是静态链接版本（当前类型: $(file "$PYTHON_BIN" | awk -F ',' '{print $1}')）"
            exit 1
          fi
          
          # 7. 记录关键路径（供dmPython编译使用）
          PYTHON_INCLUDE=$(dirname "$PYTHON_BIN")/../include/python3.10  # Python头文件路径
          PYTHON_LIB=$(dirname "$PYTHON_BIN")/../lib/python3.10        # Python库路径
          # 确保头文件目录存在
          if [ ! -d "$PYTHON_INCLUDE" ]; then
            echo "错误：Python头文件目录[$PYTHON_INCLUDE]不存在"
            ls -l $(dirname "$PYTHON_BIN")/../include  # 打印include目录内容
            exit 1
          fi
          # 写入环境变量
          echo "PYTHON_BIN=$PYTHON_BIN" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$PYTHON_INCLUDE" >> $GITHUB_ENV
          echo "PYTHON_LIB=$PYTHON_LIB" >> $GITHUB_ENV
          
          echo "✅ Python配置完成（路径: $PYTHON_BIN，版本: $("$PYTHON_BIN" --version 2>&1)）"

      - name: 编译静态libaio（musl适配，解决glibc依赖）
        run: |
          # 1. 下载libaio源码
          wget https://pagure.io/libaio/archive/libaio-0.3.113/libaio-libaio-0.3.113.tar.gz
          tar -xzf libaio-libaio-0.3.113.tar.gz
          cd libaio-libaio-0.3.113
          
          # 2. 修改Makefile强制musl编译
          echo "修改libaio Makefile适配musl..."
          # 备份原Makefile，避免修改失败
          sed -i.bak "s/^CC\s*=.*$/CC = musl-gcc/" src/Makefile  # 强制musl-gcc
          sed -i "s/^CFLAGS\s*=.*$/CFLAGS = -fPIC -static -I\/usr/include -D_GNU_SOURCE -Wall/" src/Makefile  # 静态编译参数
          sed -i "s/^LDFLAGS\s*=.*$/LDFLAGS = -static/" src/Makefile  # 静态链接
          # 验证修改结果
          echo "修改后的Makefile关键配置："
          grep -E "^CC|^CFLAGS|^LDFLAGS" src/Makefile
          
          # 3. 移除glibc特有头文件依赖（musl无bits/wordsize.h）
          find src/ -name "*.c" -exec sed -i \
            -e '/#include <bits\/wordsize.h>/d' \  # 删除引用
            -e '1i #define __WORDSIZE 64' {} +   # 手动定义64位字长
          
          # 4. 复制libaio头文件到系统目录
          sudo cp src/libaio.h /usr/include/
          if [ ! -f "/usr/include/libaio.h" ]; then
            echo "错误：libaio.h复制到/usr/include失败"
            exit 1
          fi
          
          # 5. 编译libaio（显示详细过程）
          echo "编译libaio（musl静态版）..."
          make V=1
          
          # 6. 查找生成的库文件（适配版本号差异，如1.0.1/1.0.2）
          LIB_AIO_SO=$(find src/ -name "libaio.so.*" | sort -V | tail -n 1)
          if [ -z "$LIB_AIO_SO" ] || [ ! -f "$LIB_AIO_SO" ]; then
            echo "错误：未找到生成的libaio.so文件"
            ls -l src/  # 打印src目录内容辅助排查
            exit 1
          fi
          
          # 7. 安装到系统库目录（dmPython会搜索这里）
          sudo cp "$LIB_AIO_SO" /usr/lib/x86_64-linux-gnu/
          # 创建版本无关的符号链接（libaio.so.1 -> 实际版本）
          sudo ln -sf "$(basename "$LIB_AIO_SO")" /usr/lib/x86_64-linux-gnu/libaio.so.1
          LIB_AIO_PATH="/usr/lib/x86_64-linux-gnu/libaio.so.1"
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          
          echo "✅ libaio编译完成（实际库文件: $LIB_AIO_SO，链接: $LIB_AIO_PATH）"
          cd ..  # 返回项目根目录

      - name: 用pip源码安装dmPython（解决链接失效问题）
        run: |
          # 1. 读取环境变量中的依赖路径
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          PYTHON_INCLUDE="${{ env.PYTHON_INCLUDE }}"
          PYTHON_LIB="${{ env.PYTHON_LIB }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          
          # 2. 验证依赖路径有效性
          echo "=== 验证dmPython编译依赖 ==="
          for path in "$PYTHON_BIN" "$PYTHON_INCLUDE" "$PYTHON_LIB" "$LIB_AIO_PATH"; do
            if [ -z "$path" ] || [ ! -e "$path" ]; then
              echo "错误：依赖路径[$path]无效（不存在或为空）"
              exit 1
            fi
            echo "✅ 依赖路径[$path]有效"
          done
          
          # 3. 升级pip（确保支持--no-binary选项）
          echo "升级pip..."
          $PYTHON_BIN -m pip install --upgrade pip
          
          # 4. 核心步骤：用pip强制源码安装dmPython，传递musl编译参数
          echo "从源码编译安装dmPython==2.5.22..."
          # 环境变量传递编译参数：指定编译器、头文件路径、库路径
          CFLAGS="-I$PYTHON_INCLUDE -I/usr/include -fPIC" \
          LDFLAGS="-L$PYTHON_LIB -L/usr/lib/x86_64-linux-gnu -laio -static" \
          CC="musl-gcc" \
          $PYTHON_BIN -m pip install dmPython==2.5.22 \
            --no-binary :all: \  # 强制源码安装（不使用预编译包）
            --no-cache-dir \     # 禁用缓存，避免旧版本干扰
            -v  # 显示详细编译日志，便于排查错误
          
          # 5. 验证dmPython安装成功
          echo "验证dmPython安装..."
          if ! $PYTHON_BIN -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython安装失败"
            # 打印详细错误信息（定位导入问题）
            echo "dmPython导入错误详情："
            $PYTHON_BIN -c "import dmPython" 2>&1
            exit 1
          fi
          echo "✅ dmPython 2.5.22 源码安装完成"

      - name: 安装其他Python依赖（pandas/flask等）
        run: |
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          
          # 安装有musl预编译包的依赖（版本锁定，确保兼容）
          echo "安装其他Python依赖..."
          $PYTHON_BIN -m pip install \
            pandas==2.1.4 \     # 数据处理
            flask==2.3.3 \       # Web框架
            werkzeug==2.3.7 \    # Flask依赖（版本匹配）
            pyinstaller==6.16.0 \# 打包工具
            --no-cache-dir
          
          # 验证所有依赖导入正常
          echo "验证所有依赖..."
          for lib in dmPython pandas flask werkzeug; do
            if ! $PYTHON_BIN -c "import $lib" &> /dev/null; then
              echo "错误：依赖[$lib]导入失败"
              # 打印具体错误
              echo "[$lib]导入错误详情："
              $PYTHON_BIN -c "import $lib" 2>&1
              exit 1
            fi
          done
          echo "✅ 所有Python依赖安装完成"

      - name: 静态打包应用（生成全系统兼容产物）
        run: |
          # 1. 验证入口文件
          if [ ! -f "./main.py" ]; then
            echo "错误：入口脚本main.py不存在"
            exit 1
          fi
          echo "✅ 确认入口文件main.py存在"
          
          # 2. 读取环境变量路径
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          PYTHON_LIB="${{ env.PYTHON_LIB }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          
          # 3. 执行打包（静态链接所有依赖）
          echo "开始打包应用（Python路径: $PYTHON_BIN）..."
          $PYTHON_BIN -m PyInstaller --onefile --name myapp-linux \
            --paths="$PYTHON_LIB/site-packages" \  # 指定Python依赖路径
            --hidden-import=flask \                # 显式添加Flask隐藏依赖
            --hidden-import=dmPython \             # 显式添加dmPython隐藏依赖
            --hidden-import=dmPython.dbapi2 \      # dmPython核心子模块（避免打包遗漏）
            --hidden-import=pandas \               # 显式添加pandas隐藏依赖
            --hidden-import=pandas.core \          # pandas核心子模块
            --hidden-import=pandas.io \            # pandas IO子模块
            --add-binary="$LIB_AIO_PATH:." \       # 携带libaio库到产物
            --noupx \                              # 禁用UPX（避免静态链接异常）
            ./main.py
          
          # 4. 验证打包产物
          PROD_PATH="dist/myapp-linux"
          if [ ! -f "$PROD_PATH" ]; then
            echo "错误：打包失败，未生成产物"
            # 打印打包警告日志辅助排查
            if [ -f "build/myapp-linux/warn-myapp-linux.txt" ]; then
              echo "打包警告日志："
              cat build/myapp-linux/warn-myapp-linux.txt
            fi
            exit 1
          fi
          
          # 5. 验证产物是静态链接（核心兼容性验证）
          echo "=== 打包产物信息 ==="
          echo "产物路径: $PROD_PATH"
          echo "产物类型: $(file "$PROD_PATH" | awk -F ',' '{print $1}')"
          echo "产物大小: $(du -sh "$PROD_PATH" | awk '{print $1}')"
          # 验证无动态依赖（musl静态产物ldd会提示"not a dynamic executable"）
          echo "动态依赖检查（无输出或提示'not a dynamic executable'为正常）："
          ldd "$PROD_PATH" || true
          
          echo "✅ 应用打包完成（全静态链接，兼容所有Linux系统）"

      - name: 保存打包产物（供下载）
        uses: actions/upload-artifact@v4
        with:
          name: myapp-musl-static  # 产物名称（标注musl静态版）
          path: dist/myapp-linux   # 产物路径
          retention-days: 7        # 产物保留7天
          if-no-files-found: error # 无产物时触发错误

  # Release步骤：仅当推送标签时执行
  release:
    needs: build-linux  # 依赖build-linux任务成功
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载打包产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-musl-static

      - name: 创建GitHub Release（标注兼容性）
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux  # 上传产物到Release
          generate_release_notes: true  # 自动生成更新日志
          name: "v${{ github.ref_name }}（musl静态版，全Linux兼容）"  # Release名称
          body: |
            ## 核心特性
            - **完全静态链接**：不依赖系统GLIBC、Python或libaio，直接运行
            - **兼容性**：支持Ubuntu 16.04+/CentOS 7+/Debian 9+等所有Linux系统
            - **无依赖部署**：无需安装任何系统库或Python环境
            
            ## 使用步骤
            1. 下载产物 `myapp-linux`
            2. 赋予执行权限：`chmod +x myapp-linux`
            3. 启动服务：`./myapp-linux`
            4. 访问API：http://服务器IP:5000/users（返回达梦存储过程数据）
            
            ## 注意事项
            - 默认端口：5000（修改可编辑main.py的`port=5000`后重新打包）
            - 数据库配置：需在main.py中更新`conn_params`为实际达梦地址/账号
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动提供的令牌