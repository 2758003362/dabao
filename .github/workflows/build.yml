name: 达梦API服务打包（musl静态链接，兼容所有Linux）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest  # 使用最新Ubuntu环境
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装musl工具链（静态链接依赖）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools  # 提供musl-gcc等静态编译工具
          # 验证musl安装
          if ! command -v musl-gcc &> /dev/null; then
            echo "错误：musl-tools安装失败"
            exit 1
          fi
          echo "✅ musl工具链安装完成"

      - name: 配置musl静态Python（不依赖GLIBC）
        run: |
          # 下载musl版本的静态Python（完全静态编译，不依赖系统库）
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz" ]; then
            echo "错误：musl Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python-musl
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz -C python-musl --strip-components=1
          
          # 验证Python是静态链接（无动态依赖）
          echo "Python的链接类型："
          file ./python-musl/bin/python
          # 应输出"statically linked"
          
          if [ ! -f "./python-musl/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ musl静态Python配置完成，版本：$(./python-musl/bin/python --version)"

      - name: 编译静态libaio（达梦依赖，musl兼容版）
        run: |
          # 下载libaio源码
          wget https://pagure.io/libaio/archive/libaio-0.3.113/libaio-libaio-0.3.113.tar.gz
          tar -xzf libaio-libaio-0.3.113.tar.gz
          cd libaio-libaio-0.3.113
          
          # 用musl-gcc静态编译（不依赖GLIBC）
          make CC=musl-gcc CFLAGS="-fPIC -static" LDFLAGS="-static"
          
          # 验证编译产物是静态库
          if [ ! -f "libaio.a" ] || [ ! -f "src/libaio.so.1.0.1" ]; then
            echo "错误：libaio静态编译失败"
            exit 1
          fi
          echo "libaio的链接类型："
          file src/libaio.so.1.0.1
          
          # 复制到系统目录并创建链接
          sudo cp src/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/
          sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/libaio.so.1
          LIB_AIO_PATH="/usr/lib/x86_64-linux-gnu/libaio.so.1"
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ 静态libaio编译完成，路径：$LIB_AIO_PATH"
          cd ..

      - name: 安装Python依赖（musl兼容版）
        run: |
          # 升级pip
          ./python-musl/bin/python -m pip install --upgrade pip
          
          # 安装依赖（确保版本兼容musl）
          ./python-musl/bin/python -m pip install \
            dmPython==2.5.22 \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0 \
            --no-cache-dir
          
          # 验证dmPython能否在musl环境下导入
          if ! ./python-musl/bin/python -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython在musl环境下导入失败"
            exit 1
          fi
          echo "✅ 所有依赖安装完成（musl兼容）"

      - name: 静态打包应用（不依赖系统GLIBC）
        run: |
          # 验证入口脚本
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到main.py"
            exit 1
          fi
          echo "✅ 确认main.py存在"
          
          # 获取libaio路径
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：libaio路径无效"
            exit 1
          fi
          
          # 用musl Python运行PyInstaller，生成完全静态的可执行文件
          ./python-musl/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python-musl/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --noupx \  # 禁用UPX，避免静态链接异常
            --runtime-tmpdir /tmp \  # 指定临时目录，兼容无/tmp权限的系统
            ./main.py
          
          # 验证产物是静态链接（无GLIBC依赖）
          echo "======================================"
          echo "最终产物的链接类型（应显示statically linked）："
          file dist/myapp-linux
          echo "产物的动态依赖（应无GLIBC）："
          ldd dist/myapp-linux || true  # musl静态程序ldd会报错，属于正常现象
          echo "======================================"
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          echo "✅ 静态打包完成，产物：dist/myapp-linux"

      - name: 保存产物（全系统兼容版）
        uses: actions/upload-artifact@v4
        with:
          name: myapp-musl-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-musl-static

      - name: 创建Release（musl静态版）
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
          name: "v${{ github.ref_name }} (musl静态版，全系统兼容)"
          body: |
            ## 兼容性说明
            - 完全静态链接（不依赖系统GLIBC版本）
            - 支持所有Linux系统（包括Ubuntu 16.04+、CentOS 7+等旧系统）
            - 运行方法：`chmod +x myapp-linux && ./myapp-linux`
            - 默认API地址：http://localhost:5000/users
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
