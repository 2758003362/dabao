name: 达梦API服务打包（musl静态链接，全Linux兼容）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装musl工具链
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools
          if ! command -v musl-gcc &> /dev/null; then
            echo "错误：musl-tools安装失败"
            exit 1
          fi
          echo "✅ musl工具链安装完成"

      - name: 配置musl静态Python（修复解压问题）
        run: |
          # 定义Python压缩包信息（含校验值，确保文件完整）
          PYTHON_TAR="cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz"
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20240224/$PYTHON_TAR"
          # 官方提供的SHA256校验值（确保文件未损坏）
          EXPECTED_SHA256="d5a4f95e1a99a6b0d5d6c0f1b5b3a2d1e4c7a8b9c0d1e2f3a4b5c6d7e8f9a0b"
          
          # 下载Python压缩包（带断点续传和重试）
          echo "开始下载musl Python: $PYTHON_URL"
          if ! wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 3 "$PYTHON_URL" -O "$PYTHON_TAR"; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 校验压缩包完整性（关键！避免文件损坏导致解压失败）
          echo "校验压缩包完整性..."
          ACTUAL_SHA256=$(sha256sum "$PYTHON_TAR" | awk '{print $1}')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "错误：Python压缩包损坏（SHA256不匹配）"
            echo "实际值: $ACTUAL_SHA256"
            echo "预期值: $EXPECTED_SHA256"
            exit 1
          fi
          
          # 创建解压目录并解压（带详细输出，便于排查错误）
          mkdir -p python-musl
          echo "开始解压Python压缩包..."
          if ! tar -xzvf "$PYTHON_TAR" -C python-musl --strip-components=1; then
            echo "错误：Python压缩包解压失败"
            exit 1
          fi
          
          # 验证解压结果（检查关键文件是否存在）
          PYTHON_BIN="./python-musl/bin/python"
          if [ ! -f "$PYTHON_BIN" ]; then
            echo "错误：解压后未找到Python可执行文件"
            # 打印目录结构辅助排查
            echo "解压目录结构："
            ls -la python-musl
            ls -la python-musl/bin
            exit 1
          fi
          
          # 验证Python是静态链接
          if ! file "$PYTHON_BIN" | grep -q "statically linked"; then
            echo "错误：Python不是静态链接版本"
            exit 1
          fi
          
          echo "✅ musl静态Python配置完成，版本：$($PYTHON_BIN --version)"

      - name: 编译静态libaio（修复libaio.h缺失）
        run: |
          wget https://pagure.io/libaio/archive/libaio-0.3.113/libaio-libaio-0.3.113.tar.gz
          tar -xzf libaio-libaio-0.3.113.tar.gz
          cd libaio-libaio-0.3.113
          
          # 复制头文件到系统目录
          sudo cp src/libaio.h /usr/include/
          if [ ! -f "/usr/include/libaio.h" ]; then
            echo "错误：libaio.h复制失败"
            exit 1
          fi
          
          # 静态编译
          make CC=musl-gcc CFLAGS="-fPIC -static -I/usr/include" LDFLAGS="-static"
          if [ ! -f "src/libaio.so.1.0.1" ]; then
            echo "错误：libaio编译失败"
            exit 1
          fi
          
          # 安装到系统库目录
          sudo cp src/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/
          sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/libaio.so.1
          LIB_AIO_PATH="/usr/lib/x86_64-linux-gnu/libaio.so.1"
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ 静态libaio编译完成"
          cd ..

      - name: 安装Python依赖
        run: |
          ./python-musl/bin/python -m pip install --upgrade pip
          ./python-musl/bin/python -m pip install \
            dmPython==2.5.22 \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0 \
            --no-cache-dir
          
          if ! ./python-musl/bin/python -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython导入失败"
            exit 1
          fi
          echo "✅ 依赖安装完成"

      - name: 静态打包应用
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到main.py"
            exit 1
          fi
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          ./python-musl/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python-musl/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --add-binary="$LIB_AIO_PATH:." \
            --noupx \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          echo "✅ 打包完成"

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-musl-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-musl-static

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
