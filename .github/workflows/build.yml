name: 达梦API服务打包（下载优化+全流程适配）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送自动触发
  workflow_dispatch:  # 手动触发入口

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：检出仓库代码
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      # 步骤2：安装基础工具（含ISO处理、编译依赖）
      - name: 2. 安装基础工具集
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            musl-tools tree wget findutils gcc libc6-dev \
            xorriso
          # 验证工具可用性
          for tool in musl-gcc tree wget find gcc xorriso; do
            if ! command -v $tool &> /dev/null; then
              echo "错误：基础工具[$tool]安装失败，终止流程"
              exit 1
            fi
          done
          echo "✅ 基础工具全部安装完成"

      # 步骤3：创建达梦专用用户dmdba（解决权限问题）
      - name: 3. 创建dmdba用户及dinstall组
        run: |
          # 创建dinstall组
          if ! getent group dinstall > /dev/null 2>&1; then
            sudo groupadd dinstall
            echo "✅ 创建dinstall用户组"
          fi
          # 创建dmdba用户
          if ! id -u dmdba > /dev/null 2>&1; then
            sudo useradd -g dinstall -m -d /home/dmdba dmdba
            echo "dmdba:dmdba123" | sudo chpasswd
            echo "✅ 创建dmdba用户"
          fi
          # 验证用户状态
          if id -u dmdba > /dev/null 2>&1; then
            echo "✅ dmdba用户状态正常（UID: $(id -u dmdba)，所属组: $(id -g dmdba)）"
          else
            echo "错误：dmdba用户创建失败，终止流程"
            exit 1
          fi

      # 步骤4：下载+安装达梦客户端（修复文件大小校验）
      - name: 4. 下载并安装达梦客户端
        run: |
          # 核心路径配置
          DM_TAR_URL="https://github.com/2758003362/dabao/releases/download/1.2.1/dm8_20250506_x86_rh7_64.tar.gz"
          DM_TAR_FILE="dm_client.tar.gz"
          TMP_EXTRACT_DIR="/tmp/dm_extract"
          ISO_MOUNT_DIR="/mnt/dm_iso"
          DM_INSTALL_DIR="/opt/dmdbms"

          # 4.1 下载达梦客户端（参数合并，避免解析错误）
          echo "🔄 开始下载达梦客户端包（约888M）..."
          if ! wget --continue --retry-connrefused --waitretry=5 --read-timeout=60 --timeout=30 --tries=10 --progress=bar:force "$DM_TAR_URL" -O "$DM_TAR_FILE"; then
              echo "❌ 客户端包下载失败！建议：1. 手动上传包到仓库；2. 重新触发流程"
              exit 1
          fi

          # 4.2 修复：宽松校验文件大小（允许±2M误差，避免正常压缩导致误判）
          if [ ! -f "$DM_TAR_FILE" ]; then
            echo "❌ 客户端包未下载成功（文件不存在）"
            exit 1
          fi
          MIN_VALID_SIZE=$((886 * 1024 * 1024))  # 最小886M（原888M减2M误差）
          MAX_EXPECT_SIZE=$((890 * 1024 * 1024))  # 最大890M（防止异常大文件）
          ACTUAL_SIZE=$(du -b "$DM_TAR_FILE" | awk '{print $1}')
          ACTUAL_SIZE_MB=$((ACTUAL_SIZE / 1024 / 1024))

          if [ "$ACTUAL_SIZE" -lt "$MIN_VALID_SIZE" ] || [ "$ACTUAL_SIZE" -gt "$MAX_EXPECT_SIZE" ]; then
            echo "❌ 客户端包大小异常（实际：${ACTUAL_SIZE_MB}M，需在886M-890M之间）"
            rm -f "$DM_TAR_FILE"
            exit 1
          fi
          echo "✅ 客户端包完整性校验通过（实际大小：${ACTUAL_SIZE_MB}M）"

          # 4.3 解压tar包+提取ISO
          sudo rm -rf "$TMP_EXTRACT_DIR" "$ISO_MOUNT_DIR" "$DM_INSTALL_DIR"
          sudo mkdir -p "$TMP_EXTRACT_DIR"
          if ! sudo tar -xzf "$DM_TAR_FILE" -C "$TMP_EXTRACT_DIR"; then
            echo "❌ tar包解压失败（文件可能损坏）"
            exit 1
          fi
          
          # 查找ISO文件
          DM_ISO_FILE=$(find "$TMP_EXTRACT_DIR" -name "*.iso" -type f | head -n 1)
          if [ -z "$DM_ISO_FILE" ]; then
            echo "❌ 未找到ISO文件，tar包内结构："
            tree "$TMP_EXTRACT_DIR"
            exit 1
          fi
          # 提取ISO内容
          sudo mkdir -p "$ISO_MOUNT_DIR"
          if ! sudo xorriso -osirrox on -indev "$DM_ISO_FILE" -extract / "$ISO_MOUNT_DIR"; then
            echo "❌ ISO提取失败"
            exit 1
          fi

          # 4.4 运行安装程序（静默安装客户端）
          DM_INSTALLER=$(find "$ISO_MOUNT_DIR" -name "DMInstall.bin" -type f | head -n 1)
          if [ -z "$DM_INSTALLER" ]; then
            echo "❌ 未找到DMInstall.bin，ISO内结构："
            tree "$ISO_MOUNT_DIR"
            exit 1
          fi
          sudo chmod +x "$DM_INSTALLER"
          sudo mkdir -p "$DM_INSTALL_DIR"
          sudo chown -R dmdba:dinstall "$DM_INSTALL_DIR"
          
          # 静默安装客户端
          if ! sudo -u dmdba "$DM_INSTALLER" -i -t client -d "$DM_INSTALL_DIR"; then
            echo "❌ 客户端安装失败（达梦安装程序报错）"
            exit 1
          fi

          # 4.5 配置环境变量（供后续编译使用）
          DM_LIB=$(find "$DM_INSTALL_DIR" -name "libdmdpi.so" -type f | head -n 1)
          DM_HEADER=$(find "$DM_INSTALL_DIR" -name "dmdbai.h" -type f | head -n 1)
          if [ -z "$DM_LIB" ] || [ -z "$DM_HEADER" ]; then
            echo "❌ 客户端文件缺失，安装目录结构："
            tree "$DM_INSTALL_DIR" --dirsfirst | head -50
            exit 1
          fi
          echo "DM_HOME=$DM_INSTALL_DIR" >> $GITHUB_ENV
          echo "DM_LIB_PATH=$(dirname "$DM_LIB")" >> $GITHUB_ENV
          echo "DM_INCLUDE_PATH=$(dirname "$DM_HEADER")" >> $GITHUB_ENV
          echo "✅ 达梦客户端安装完成"

      # 步骤5：配置静态Python 3.11
      - name: 5. 配置静态Python 3.11
        run: |
          PYTHON_TAR="cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz"
          PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20240224/$PYTHON_TAR"
          EXPECTED_SHA256="08e1ebf51b5965e23f8e68664d17274c1cdabb5b2d7509a2003920e5d58172c7"

          # 下载+校验Python
          if ! wget "$PYTHON_URL" -O "$PYTHON_TAR"; then
            echo "错误：Python包下载失败"
            exit 1
          fi
          if [ "$(sha256sum "$PYTHON_TAR" | awk '{print $1}')" != "$EXPECTED_SHA256" ]; then
            echo "错误：Python SHA256不匹配"
            exit 1
          fi

          # 解压+定位Python
          PYTHON_DIR="$GITHUB_WORKSPACE/python-musl"
          rm -rf "$PYTHON_DIR"
          mkdir -p "$PYTHON_DIR"
          if ! tar -xzvf "$PYTHON_TAR" -C "$PYTHON_DIR"; then
            echo "错误：Python包解压失败"
            exit 1
          fi

          # 查找Python可执行文件
          PYTHON_BIN=$(find "$PYTHON_DIR" -name "python3.11" -type f -executable | head -n 1)
          if [ -z "$PYTHON_BIN" ]; then
            PYTHON_BIN=$(find "$PYTHON_DIR" -name "python3" -type f -executable | head -n 1)
            if [[ -z "$PYTHON_BIN" || ! "$($PYTHON_BIN --version 2>&1)" =~ "3.11" ]]; then
              echo "错误：未找到Python 3.11"
              exit 1
            fi
          fi
          PYTHON_BIN=$(realpath "$PYTHON_BIN")

          # 配置环境变量
          PYTHON_INCLUDE=$(realpath "$(dirname "$PYTHON_BIN")/../include/python3.11")
          PYTHON_LIB=$(realpath "$(dirname "$PYTHON_BIN")/../lib/python3.11")
          if [ ! -d "$PYTHON_INCLUDE" ] || [ ! -d "$PYTHON_LIB" ]; then
            echo "错误：Python头文件/库目录不存在"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$PYTHON_INCLUDE" >> $GITHUB_ENV
          echo "PYTHON_LIB=$PYTHON_LIB" >> $GITHUB_ENV
          echo "✅ Python 3.11配置完成"

      # 步骤6：编译静态libaio
      - name: 6. 编译静态libaio
        run: |
          # 下载libaio源码
          LIB_AIO_URL="https://pagure.io/libaio/archive/libaio-0.3.113/libaio-libaio-0.3.113.tar.gz"
          if ! wget "$LIB_AIO_URL" -O "libaio-libaio-0.3.113.tar.gz"; then
            echo "错误：libaio源码下载失败"
            exit 1
          fi
          # 解压
          if ! tar -xzf "libaio-libaio-0.3.113.tar.gz"; then
            echo "错误：libaio源码解压失败"
            exit 1
          fi
          cd libaio-libaio-0.3.113 || exit 1

          # 修改Makefile适配musl
          sed -i.bak "s|^CC\s*=.*$|CC = musl-gcc|" src/Makefile
          sed -i "s|^CFLAGS\s*=.*$|CFLAGS = -fPIC -static -I/usr/include -D_GNU_SOURCE -Wall|" src/Makefile
          sed -i "s|^LDFLAGS\s*=.*$|LDFLAGS = -static|" src/Makefile

          # 修复编译错误（移除bits/wordsize.h依赖）
          find src/ -name "*.c" -exec sed -i -e '/#include <bits\/wordsize.h>/d' -e '1i #define __WORDSIZE 64' {} \;

          # 编译+安装
          sudo cp src/libaio.h /usr/include/
          if ! make V=1; then
            echo "错误：libaio编译失败"
            exit 1
          fi
          LIB_AIO_SO=$(find src/ -name "libaio.so.*" | sort -V | tail -n 1)
          if [ -z "$LIB_AIO_SO" ]; then
            echo "错误：未找到编译后的libaio库"
            exit 1
          fi
          sudo cp "$LIB_AIO_SO" /usr/lib/x86_64-linux-gnu/
          sudo ln -sf "$(basename "$LIB_AIO_SO")" /usr/lib/x86_64-linux-gnu/libaio.so.1

          echo "LIB_AIO_PATH=/usr/lib/x86_64-linux-gnu/libaio.so.1" >> $GITHUB_ENV
          echo "✅ libaio编译完成"
          cd .. || exit 1

      # 步骤7：编译安装dmPython
      - name: 7. 编译安装dmPython
        run: |
          # 读取环境变量
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          PYTHON_INCLUDE="${{ env.PYTHON_INCLUDE }}"
          PYTHON_LIB="${{ env.PYTHON_LIB }}"
          DM_HOME="${{ env.DM_HOME }}"
          DM_LIB_PATH="${{ env.DM_LIB_PATH }}"
          DM_INCLUDE_PATH="${{ env.DM_INCLUDE_PATH }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"

          # 验证依赖路径
          for path in "$PYTHON_BIN" "$DM_INCLUDE_PATH" "$DM_LIB_PATH" "$LIB_AIO_PATH"; do
            if [ ! -e "$path" ]; then
              echo "错误：依赖路径[$path]无效"
              exit 1
            fi
          done

          # 升级pip
          if ! "$PYTHON_BIN" -m pip install pip==25.2 -i https://pypi.org/simple/; then
            echo "错误：pip升级失败"
            exit 1
          fi

          # 下载dmPython源码
          DM_PYTHON_URL="https://raw.githubusercontent.com/2758003362/dabao/master/dmPython.tar.gz"
          if ! wget "$DM_PYTHON_URL" -O "dmPython.tar.gz"; then
            echo "错误：dmPython源码下载失败"
            exit 1
          fi
          # 解压
          rm -rf dmPython-src
          mkdir -p dmPython-src
          if ! tar -xzf "dmPython.tar.gz" -C dmPython-src --strip-components=1; then
            echo "错误：dmPython源码解压失败"
            exit 1
          fi
          cd dmPython-src || exit 1

          # 编译安装（参数合并到同一行）
          echo "🔄 编译dmPython..."
          if ! CC="musl-gcc" CFLAGS="-I$PYTHON_INCLUDE -I$DM_INCLUDE_PATH -fPIC -DDM_USE_AIO=1" LDFLAGS="-L$PYTHON_LIB -L$DM_LIB_PATH -L/usr/lib/x86_64-linux-gnu -ldmdpi -laio -static" "$PYTHON_BIN" setup.py install --dm-home="$DM_HOME"; then
            echo "错误：dmPython编译失败"
            exit 1
          fi

          cd .. || exit 1

          # 验证安装
          if ! "$PYTHON_BIN" -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython安装失败，详细错误："
            "$PYTHON_BIN" -c "import dmPython" 2>&1
            exit 1
          fi
          DM_VERSION=$("$PYTHON_BIN" -c 'import dmPython; print(f"dmPython版本：{dmPython.__version__}")')
          echo "✅ $DM_VERSION 安装完成"

      # 步骤8：安装业务依赖
      - name: 8. 安装业务依赖
        run: |
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          # 安装固定版本依赖
          if ! "$PYTHON_BIN" -m pip install \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0 \
            --no-cache-dir \
            -i https://pypi.org/simple/; then
            echo "错误：业务依赖安装失败"
            exit 1
          fi

          # 验证依赖
          for lib in dmPython pandas flask werkzeug; do
            if ! "$PYTHON_BIN" -c "import $lib" &> /dev/null; then
              echo "错误：[$lib]导入失败"
              "$PYTHON_BIN" -c "import $lib" 2>&1
              exit 1
            fi
          done
          echo "✅ 业务依赖安装完成"

      # 步骤9：静态打包应用
      - name: 9. 静态打包应用
        run: |
          # 检查主程序
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到应用主程序（main.py）"
            exit 1
          fi

          # 读取依赖路径
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          DM_LIB_PATH="${{ env.DM_LIB_PATH }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"

          # 打包命令（参数合并，避免解析错误）
          echo "🔄 打包应用..."
          if ! "$PYTHON_BIN" -m PyInstaller --onefile --name myapp-linux --paths="$PYTHON_LIB/site-packages" --paths="$DM_LIB_PATH" --hidden-import=dmPython --hidden-import=dmPython.dbapi2 --hidden-import=dmPython._dmPython --add-binary="$DM_LIB_PATH/libdmdpi.so:." --add-binary="$LIB_AIO_PATH:." --noupx ./main.py; then
            echo "错误：应用打包失败"
            # 输出打包日志，便于调试
            if [ -f "build/myapp-linux/warn-myapp-linux.txt" ]; then
              cat "build/myapp-linux/warn-myapp-linux.txt"
            fi
            exit 1
          fi

          # 验证产物
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包产物不存在"
            exit 1
          fi
          echo "✅ 应用打包完成，产物路径：dist/myapp-linux"

      # 步骤10：保存产物
      - name: 10. 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-musl-static
          path: dist/myapp-linux
          retention-days: 7

  # 步骤11：自动创建Release（仅标签推送时触发）
  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 1. 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-musl-static

      - name: 2. 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
          name: "v${{ github.ref_name }}（musl静态版）"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}