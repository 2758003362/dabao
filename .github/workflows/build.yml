name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    # 使用Ubuntu 22.04（GLIBC 2.35）确保兼容性
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境（x86_64架构）
        run: |
          # 使用最新x86_64架构Python包（20251014版，兼容低GLIBC）
          wget https://github.com/astral-sh/python-build-standalone/releases/download/20251014/cpython-3.11.14+20251014-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # 验证下载文件存在性
          if [ ! -f "cpython-3.11.14+20251014-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          # 解压文件名同步更新
          tar -xzf cpython-3.11.14+20251014-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ 静态Python配置完成，版本：$(./python/bin/python --version)"

      - name: 安装libaio1（写入环境变量，跨步骤共享）
        run: |
          LIB_AIO_URLS=(
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "https://mirrors.aliyun.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "http://mirrors.163.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
          )
          
          for url in "${LIB_AIO_URLS[@]}"; do
            echo "尝试从 $url 下载libaio1..."
            if wget -q "$url" -O libaio1.deb; then
              echo "✅ 下载成功"
              break
            fi
          done
          
          if [ ! -f "libaio1.deb" ]; then
            echo "错误：所有源均下载失败"
            exit 1
          fi
          
          sudo dpkg -i --force-depends libaio1.deb
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装失败"
            exit 1
          fi
          
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "获取到的libaio路径：[$LIB_AIO_PATH]"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：获取的libaio路径无效（文件不存在）"
            ls -la /lib/x86_64-linux-gnu/ | grep libaio
            exit 1
          fi
          
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功，路径已写入环境变量"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==2.1.4 flask==2.3.3 werkzeug==2.3.7 pyinstaller==6.16.0
          
          if ./python/bin/python -c "import dmPython" &> /dev/null; then
            echo "✅ dmPython安装成功"
          else
            echo "错误：dmPython安装失败（可能是libaio依赖问题）"
            exit 1
          fi
          echo "✅ 所有依赖安装完成"

      - name: 打包应用（最终稳定版）
        run: |
          echo "当前目录文件列表："
          ls -la
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          echo "✅ 确认main.py存在"
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          echo "从环境变量获取的libaio路径：[$LIB_AIO_PATH]"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "警告：环境变量路径无效，尝试重新获取..."
            LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "错误：重新获取路径仍无效"
              exit 1
            fi
            echo "fallback成功，路径：$LIB_AIO_PATH"
          fi
          
          echo "开始打包，使用libaio路径：$LIB_AIO_PATH"
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --add-binary="/usr/lib/x86_64-linux-gnu/libstdc++.so.6:." \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败，未生成产物"
            exit 1
          fi
          echo "✅ 打包完成，产物信息："
          ls -lh dist/myapp-linux
          echo "检查产物依赖的GLIBC版本："
          objdump -T dist/myapp-linux | grep GLIBC_2.38 || echo "✅ 未发现 GLIBC_2.38 依赖"

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
