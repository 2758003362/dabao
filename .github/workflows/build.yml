name: 达梦API服务打包（兼容GLIBC 2.31）

on:
  push:
    tags:
      - 'v*.*.*'  # 推送标签触发构建
  workflow_dispatch:  # 手动触发，方便测试

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境（兼容GLIBC 2.31）
        run: |
          # 下载静态Python压缩包（长期稳定链接）
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # 验证下载
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 解压
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          # 验证Python可用性
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          ./python/bin/python --version

      - name: 双备选源获取 libaio.so.1（100% 可靠）
        run: |
          # 备选源1：网易开源镜像（优先尝试，稳定性高）
          LIB_AIO_DEB_URL="http://mirrors.163.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
          # 备选源2：Ubuntu官方旧归档（备用，永久保留旧包）
          BACKUP_URL="http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
          
          # 尝试下载备选源1，失败则用备选源2
          if ! wget "$LIB_AIO_DEB_URL"; then
            echo "备选源1下载失败，尝试备选源2"
            wget "$BACKUP_URL" || { echo "错误：所有源均下载失败"; exit 1; }
          fi
          
          # 提取libaio.so.1（从deb包中直接提取，不依赖安装）
          ar x libaio1_0.3.113-4_amd64.deb data.tar.xz  # 解压deb包的data部分
          tar -xf data.tar.xz ./usr/lib/x86_64-linux-gnu/libaio.so.1.0.1  # 提取核心库文件
          
          # 部署到系统库目录（让dmPython能找到）
          sudo cp ./usr/lib/x86_64-linux-gnu/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/
          sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/libaio.so.1  # 创建软链接
          
          # 更新系统库缓存
          sudo ldconfig
          
          # 验证是否成功（必须确保存在）
          if ! ldconfig -p | grep -q "libaio.so.1"; then
            echo "错误：libaio.so.1部署失败"
            exit 1
          fi
          echo "✅ libaio.so.1部署成功"

      - name: 安装Python项目依赖（含dmPython）
        run: |
          ./python/bin/python -m pip install --upgrade pip
          # 安装依赖（此时dmPython能找到libaio.so.1，不会报错）
          ./python/bin/python -m pip install \
            dmPython==2.5.1 \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0

      - name: 打包Linux可执行程序（携带libaio.so.1）
        run: |
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="/usr/lib/x86_64-linux-gnu/libaio.so.1:." \  # 打包时携带libaio.so.1
            main.py

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载打包产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}