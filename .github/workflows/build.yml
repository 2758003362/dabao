name: 达梦API服务打包（musl静态链接，全Linux兼容）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest  # 基于最新Ubuntu构建，生成静态兼容包
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装musl工具链（静态链接核心依赖）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools  # 提供musl-gcc静态编译工具
          # 验证musl安装
          if ! command -v musl-gcc &> /dev/null; then
            echo "错误：musl-tools安装失败"
            exit 1
          fi
          echo "✅ musl工具链安装完成，版本：$(musl-gcc --version | awk 'NR==1{print $1,$2,$3}')"

      - name: 配置musl静态Python（不依赖系统GLIBC）
        run: |
          # 下载musl版本的静态Python（完全独立，无系统依赖）
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz" ]; then
            echo "错误：musl Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python-musl
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-musl-install_only.tar.gz -C python-musl --strip-components=1
          
          # 关键验证：确保Python是静态链接（无系统库依赖）
          PYTHON_LINK_TYPE=$(file ./python-musl/bin/python | grep -o "statically linked")
          if [ "$PYTHON_LINK_TYPE" != "statically linked" ]; then
            echo "错误：Python不是静态链接，无法兼容旧系统"
            exit 1
          fi
          
          if [ ! -f "./python-musl/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ musl静态Python配置完成，版本：$(./python-musl/bin/python --version)"

      - name: 编译静态libaio（修复libaio.h缺失问题）
        run: |
          # 1. 下载libaio源码（达梦依赖）
          wget https://pagure.io/libaio/archive/libaio-0.3.113/libaio-libaio-0.3.113.tar.gz
          tar -xzf libaio-libaio-0.3.113.tar.gz
          cd libaio-libaio-0.3.113
          
          # 2. 核心修复：复制libaio.h到系统头文件目录（musl-gcc搜索路径）
          sudo cp src/libaio.h /usr/include/
          # 验证头文件是否存在
          if [ ! -f "/usr/include/libaio.h" ]; then
            echo "错误：libaio.h复制到/usr/include失败"
            exit 1
          fi
          echo "✅ libaio.h已成功复制到系统头文件目录"
          
          # 3. 用musl-gcc静态编译libaio（指定头文件路径+静态参数）
          make CC=musl-gcc \
               CFLAGS="-fPIC -static -I/usr/include" \  # -I指定头文件路径，避免找不到libaio.h
               LDFLAGS="-static"  # 强制静态链接
          
          # 4. 验证编译产物（动态库+静态库均需生成）
          if [ ! -f "src/libaio.so.1.0.1" ] || [ ! -f "src/libaio.a" ]; then
            echo "错误：libaio静态编译失败，未生成产物"
            exit 1
          fi
          echo "libaio编译产物链接类型："
          file src/libaio.so.1.0.1
          
          # 5. 安装libaio到系统库目录（dmPython会搜索这里）
          sudo cp src/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/
          sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/libaio.so.1
          LIB_AIO_PATH="/usr/lib/x86_64-linux-gnu/libaio.so.1"
          
          # 6. 验证libaio路径有效性
          if [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：libaio安装路径无效"
            exit 1
          fi
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV  # 写入环境变量，供后续打包使用
          echo "✅ 静态libaio编译并安装完成，路径：$LIB_AIO_PATH"
          cd ..  # 返回项目根目录

      - name: 安装Python依赖（musl兼容版）
        run: |
          # 升级pip到最新兼容版本
          ./python-musl/bin/python -m pip install --upgrade pip
          
          # 安装依赖（版本锁定，确保musl环境兼容）
          ./python-musl/bin/python -m pip install \
            dmPython==2.5.22 \  # 达梦驱动，依赖已编译的静态libaio
            pandas==2.1.4 \     # 数据处理，musl兼容
            flask==2.3.3 \       # Web框架，轻量无特殊依赖
            werkzeug==2.3.7 \    # Flask依赖，版本匹配
            pyinstaller==6.16.0 \# 打包工具，支持musl静态打包
            --no-cache-dir  # 禁用缓存，避免旧版本依赖干扰
          
          # 关键验证：dmPython能否在musl环境下正常导入（核心依赖验证）
          if ! ./python-musl/bin/python -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython在musl环境下导入失败（可能是libaio依赖问题）"
            # 辅助排查：打印dmPython路径和依赖
            DM_PYTHON_PATH=$(./python-musl/bin/python -c "import dmPython; print(dmPython.__file__)")
            echo "dmPython路径：$DM_PYTHON_PATH"
            ldd $DM_PYTHON_PATH || true  # musl环境下ldd提示"not dynamic"属正常
            exit 1
          fi
          echo "✅ 所有Python依赖安装完成，且dmPython导入正常"

      - name: 静态打包应用（生成全系统兼容的单文件）
        run: |
          # 1. 验证入口脚本存在
          if [ ! -f "./main.py" ]; then
            echo "错误：入口脚本main.py不存在"
            exit 1
          fi
          echo "✅ 确认main.py存在于项目根目录"
          
          # 2. 从环境变量获取libaio路径
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：从环境变量获取的libaio路径无效"
            exit 1
          fi
          echo "打包使用的libaio路径：$LIB_AIO_PATH"
          
          # 3. 执行打包（musl环境下生成完全静态的可执行文件）
          ./python-musl/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python-musl/lib/python3.11/site-packages \  # 指定Python依赖路径
            --hidden-import=flask \                              # 显式添加Flask隐藏依赖
            --hidden-import=dmPython \                           # 显式添加dmPython隐藏依赖
            --hidden-import=dmPython.dbapi2 \                    # dmPython核心子模块，避免打包遗漏
            --hidden-import=pandas \                            # 显式添加pandas隐藏依赖
            --hidden-import=pandas.core \                        # pandas核心子模块
            --hidden-import=pandas.io \                         # pandas IO子模块
            --add-binary="$LIB_AIO_PATH:." \                     # 携带libaio到打包产物
            --noupx \                                            # 禁用UPX压缩，避免静态链接异常
            --runtime-tmpdir /tmp \                              # 指定临时目录，兼容无/tmp权限的系统
            ./main.py  # 入口脚本（明确路径，避免找不到文件）
          
          # 4. 验证打包产物（核心兼容性验证）
          echo "======================================"
          echo "最终打包产物信息："
          PROD_PATH="dist/myapp-linux"
          if [ ! -f "$PROD_PATH" ]; then
            echo "错误：打包失败，未生成产物"
            exit 1
          fi
          # 验证产物是静态链接（关键！确保无系统依赖）
          PROD_LINK_TYPE=$(file "$PROD_PATH" | grep -o "statically linked")
          if [ "$PROD_LINK_TYPE" != "statically linked" ]; then
            echo "警告：产物不是完全静态链接，可能无法兼容旧系统"
          else
            echo "✅ 产物为完全静态链接，支持所有Linux系统"
          fi
          echo "产物大小：$(du -sh "$PROD_PATH" | awk '{print $1}')"
          echo "产物权限：$(ls -l "$PROD_PATH" | awk '{print $1,$3,$4}')"
          echo "======================================"
          
          echo "✅ 静态打包完成，产物路径：$PROD_PATH"

      - name: 保存打包产物（供下载使用）
        uses: actions/upload-artifact@v4
        with:
          name: myapp-musl-static  # 产物名称，标注musl静态版
          path: dist/myapp-linux   # 产物路径
          retention-days: 7        # 产物保留7天
          if-no-files-found: error # 无产物时触发错误，便于排查

  release:
    needs: build-linux  # 依赖build-linux任务成功后执行
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # 仅推送标签时触发
    steps:
      - name: 下载打包产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-musl-static

      - name: 创建GitHub Release（标注兼容性）
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux  # 上传产物到Release
          generate_release_notes: true  # 自动生成Release说明
          name: "v${{ github.ref_name }}（musl静态版，全Linux兼容）"  # Release名称
          body: |
            ## 版本特性
            - **完全静态链接**：不依赖系统GLIBC、Python或其他库，直接运行
            - **兼容性**：支持Ubuntu 16.04+/20.04+/22.04+、CentOS 7+/8、Debian 9+等所有Linux系统
            - **无依赖部署**：无需安装Python、数据库驱动或系统库
            
            ## 使用步骤
            1. 下载产物 `myapp-linux`
            2. 赋予执行权限：`chmod +x myapp-linux`
            3. 启动服务：`./myapp-linux`
            4. 访问API：http://服务器IP:5000/users（返回达梦存储过程数据）
            
            ## 注意事项
            - 默认端口：5000（如需修改，可编辑main.py中的`port=5000`后重新打包）
            - 数据库配置：需在main.py中修改`conn_params`为实际达梦数据库地址、账号密码
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动提供的令牌，无需手动配置