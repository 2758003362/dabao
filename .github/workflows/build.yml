name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置低GLIBC兼容的静态Python环境（修复文件过小问题）
        run: |
          # 1. 更新为经过验证的有效链接（2024年版本，兼容GLIBC 2.17+）
          PYTHON_URLS=(
            "https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz"  # ~85MB
            "https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.10.13+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz"  # ~80MB
            "https://github.com/astral-sh/python-build-standalone/releases/download/20231210/cpython-3.11.7+20231210-x86_64-unknown-linux-gnu-install_only.tar.gz"  # ~83MB
          )
          
          filename=""
          # 2. 增强下载校验（文件大小+文件类型双重验证）
          for url in "${PYTHON_URLS[@]}"; do
            current_filename=$(basename "$url")
            echo "=== 尝试下载: $url ==="
            rm -f "$current_filename"  # 清理旧文件
            
            # 增加详细输出模式（-v），便于排查下载问题
            if wget -v --timeout=30 --tries=5 "$url" -O "$current_filename"; then
              # 验证1：文件大小（至少70MB，兼容最新版本）
              file_size=$(du -m "$current_filename" | cut -f1)
              if [ "$file_size" -lt 70 ]; then
                echo "警告：文件过小（$file_size MB），可能是错误页面"
                # 输出文件前10行，确认是否为HTML错误
                echo "文件前10行内容："
                head -n 10 "$current_filename"
                rm -f "$current_filename"
                continue
              fi
              
              # 验证2：文件类型（必须是gzip压缩包）
              file_type=$(file "$current_filename" | grep -i "gzip compressed data")
              if [ -z "$file_type" ]; then
                echo "警告：文件不是有效的gzip压缩包"
                rm -f "$current_filename"
                continue
              fi
              
              echo "✅ 下载成功！文件大小：$file_size MB，类型：$file_type"
              filename="$current_filename"
              break
            fi
            echo "❌ 该链接下载失败，尝试下一个"
          done
          
          # 3. 确认下载结果
          if [ -z "$filename" ] || [ ! -f "$filename" ]; then
            echo "错误：所有Python压缩包下载/校验失败"
            exit 1
          fi
          
          # 4. 解压优化（保持之前的修复）
          echo "=== 开始解压: $filename ==="
          mkdir -p python
          if ! tar -xzvf "$filename" -C python --strip-components=1 --warning=no-unknown-keyword --overwrite; then
            echo "错误：tar解压失败"
            ls -la
            ls -la python 2>/dev/null || true
            exit 1
          fi
          
          # 5. 验证Python核心文件
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：未找到python可执行文件"
            find python -type f | head -20
            exit 1
          fi
          
          # 6. 确认版本与依赖
          python_version=$(./python/bin/python --version 2>&1)
          echo "✅ 静态Python配置完成，版本：$python_version"
          echo "Python的GLIBC依赖检查："
          ldd ./python/bin/python | grep libc || echo "静态编译Python，无libc依赖"

      - name: 安装libaio1并验证版本兼容性
        run: |
          LIB_AIO_URLS=(
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "https://mirrors.aliyun.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
          )
          
          for url in "${LIB_AIO_URLS[@]}"; do
            echo "尝试从 $url 下载libaio1..."
            if wget -q "$url" -O libaio1.deb; then
              echo "✅ 下载成功"
              break
            fi
          done
          
          if [ ! -f "libaio1.deb" ]; then
            echo "错误：所有源均下载失败"
            exit 1
          fi
          
          sudo dpkg -i --force-depends libaio1.deb
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装失败"
            exit 1
          fi
          
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "获取到的libaio路径：[$LIB_AIO_PATH]"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：获取的libaio路径无效"
            ls -la /lib/x86_64-linux-gnu/ | grep libaio
            exit 1
          fi
          
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功"

      - name: 安装兼容低GLIBC的Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip==23.3.1
          ./python/bin/python -m pip install \
            dmPython==2.5.22 \
            pandas==1.5.3 \
            flask==2.2.5 \
            werkzeug==2.2.3 \
            pyinstaller==5.13.2
          
          echo "检查dmPython的依赖："
          ldd $(find ./python -name "dmPython.*.so") | grep libc || true
          
          if ./python/bin/python -c "import dmPython; import pandas; import flask" &> /dev/null; then
            echo "✅ 所有核心依赖安装成功"
          else
            echo "错误：依赖安装失败"
            exit 1
          fi

      - name: 打包应用（强制低GLIBC兼容）
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          echo "使用libaio路径：$LIB_AIO_PATH"
          
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "警告：环境变量路径无效，尝试重新获取..."
            LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "错误：重新获取路径仍无效"
              exit 1
            fi
          fi
          
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --runtime-tmpdir=. \
            --strip \
            --exclude-module=ctypes \
            --exclude-module=distutils \
            --no-compress \
            ./main.py
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败，未生成产物"
            exit 1
          fi
          
          echo "==== 产物GLIBC依赖检查 ===="
          objdump -T dist/myapp-linux | grep GLIBC_ | sort -u | grep -v GLIBC_2.3[2-9] | grep -v GLIBC_2.[4-9]
          echo "=========================="
          
          if objdump -T dist/myapp-linux | grep GLIBC_ | sort -u | grep -q -E 'GLIBC_2.3[2-9]|GLIBC_2.[4-9]'; then
            echo "警告：检测到高于GLIBC 2.31的依赖"
            objdump -T dist/myapp-linux | grep GLIBC_ | sort -u | grep -E 'GLIBC_2.3[2-9]|GLIBC_2.[4-9]'
          else
            echo "✅ 未检测到高于GLIBC 2.31的依赖"
          fi
          
          echo "✅ 打包完成"
          ls -lh dist/myapp-linux

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
