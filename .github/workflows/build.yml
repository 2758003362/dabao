name: 达梦API服务打包（兼容GLIBC 2.31）

on:
  push:
    tags:
      - 'v*.*.*'  # 推送标签触发构建
  workflow_dispatch:  # 手动触发，方便测试

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境（兼容GLIBC 2.31）
        run: |
          # 下载静态Python压缩包
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # 验证下载
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 解压
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          # 验证Python可用性
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          ./python/bin/python --version

      - name: 修复源并安装libaio1（关键：确保找到包）
        run: |
          # 1. 修复软件源（添加main组件，避免源缺失问题）
          sudo sed -i 's/^# deb http:\/\/archive.ubuntu.com\/ubuntu\/ jammy main/deb http:\/\/archive.ubuntu.com\/ubuntu\/ jammy main/' /etc/apt/sources.list
          sudo sed -i 's/^# deb http:\/\/security.ubuntu.com\/ubuntu\/ jammy-security main/deb http:\/\/security.ubuntu.com\/ubuntu\/ jammy-security main/' /etc/apt/sources.list
          
          # 2. 强制更新源（获取最新包列表）
          sudo apt-get update -y --fix-missing
          
          # 3. 不指定版本，直接安装源中存在的libaio1
          sudo apt-get install -y libaio1
          
          # 4. 再次验证安装
          if ! dpkg -l | grep -q "libaio1"; then
            echo "错误：libaio1安装失败，无法继续"
            exit 1
          fi
          echo "✅ libaio1安装成功"

      - name: 安装Python项目依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          # 安装依赖（dmPython指定版本，避免兼容性问题）
          ./python/bin/python -m pip install \
            dmPython==2.5.1 \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0

      - name: 打包Linux可执行程序
        run: |
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            main.py

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载打包产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}