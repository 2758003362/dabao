name: 极速 Debian 11 打包

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04  # 官方环境，GLIBC 2.31，启动最快
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 缓存 PyInstaller 构建
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            build/
            dist/
            __pycache__/
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('**/requirements.txt', '**/main.py') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: 安装依赖和打包
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          pyinstaller --onefile --clean --noconfirm main.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-linux-glibc2.31
          path: dist/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-linux-glibc2.31

      - name: 重命名文件
        run: |
          mv myapp-linux myapp-linux-glibc2.31
          chmod +x myapp-linux-glibc2.31

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux-glibc2.31
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}