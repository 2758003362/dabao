name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          set -x
          PYTHON_URLS=(
            "https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.10.13+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz"
          )
          
          for url in "${PYTHON_URLS[@]}"; do
            current_filename=$(basename "$url")
            rm -f "$current_filename"
            if wget -v "$url" -O "$current_filename"; then
              if [ $(du -m "$current_filename" | cut -f1) -ge 25 ] && file "$current_filename" | grep -qi "gzip"; then
                echo "✅ Python下载成功"
                filename="$current_filename"
                break
              fi
            fi
          done
          
          mkdir -p python
          tar -xzvf "$filename" -C python --strip-components=1 --warning=no-unknown-keyword --overwrite
          [ -f "./python/bin/python" ] || { echo "错误：Python解压失败"; exit 1; }
          echo "✅ Python版本：$(./python/bin/python --version)"

      - name: 安装libaio1（适配Ubuntu 24.04 deb822源+容错验证）
        run: |
          set -x
          set -euo pipefail
          
          echo "=== 1. 适配Ubuntu 24.04源格式（deb822） ==="
          # 24.04用add-apt-repository管理源，需先安装工具包
          sudo apt-get install -y software-properties-common || { echo "错误：安装源管理工具失败"; exit 1; }
          
          # 启用universe源（24.04正确方式，自动更新deb822格式的ubuntu.sources）
          if ! grep -q "universe" /etc/apt/sources.list.d/ubuntu.sources; then
            echo "启用universe源（适配deb822格式）"
            sudo add-apt-repository -y universe
            sudo apt-get update -y -v || { echo "错误：apt update失败"; exit 1; }
          fi
          
          echo "=== 2. 安装libaio1（优先apt） ==="
          # 显式确认包存在
          if ! apt-cache show libaio1 &> /dev/null; then
            echo "错误：apt仓库中未找到libaio1（universe源未启用成功）"
            exit 1
          fi
          
          # 安装（允许apt返回成功后dpkg状态异常，后续用文件验证）
          sudo apt-get install -y -v libaio1
          echo "✅ apt安装命令执行完成"
          
          echo "=== 3. 多重容错验证（文件优先） ==="
          # 关键：以“文件实际存在”为最终判断标准，而非dpkg数据库
          LIB_AIO_DEFAULT_PATH="/lib/x86_64-linux-gnu/libaio.so.1"
          
          # 验证1：检查dpkg状态（宽松模式，失败不退出）
          if dpkg -s libaio1 &> /dev/null; then
            echo "✅ 验证1（dpkg）：libaio1已注册"
          else
            echo "⚠️ 验证1（dpkg）：dpkg数据库未记录，但以文件为准"
          fi
          
          # 验证2：检查核心文件是否存在（最终验证）
          if [ -f "$LIB_AIO_DEFAULT_PATH" ]; then
            LIB_AIO_PATH="$LIB_AIO_DEFAULT_PATH"
            echo "✅ 验证2（文件）：libaio.so.1存在，路径：$LIB_AIO_PATH"
          else
            # 兜底：查找文件（防止路径异常）
            LIB_AIO_PATH=$(find /lib/x86_64-linux-gnu/ /usr/lib/x86_64-linux-gnu/ -name "libaio.so.1" | head -n 1)
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "❌ 验证2失败：未找到libaio.so.1，尝试手动安装"
              # 手动下载fallback（Debian源，兼容24.04）
              wget -v "https://ftp.br.debian.org/debian/pool/main/liba/libaio/libaio1_0.3.113-5_amd64.deb" -O libaio1.deb
              sudo dpkg -i --force-all libaio1.deb  # 强制安装，忽略dpkg校验
              LIB_AIO_PATH="$LIB_AIO_DEFAULT_PATH"
              [ -f "$LIB_AIO_PATH" ] || { echo "错误：手动安装后仍无文件"; exit 1; }
            fi
          fi
          
          echo "=== 4. 确认文件有效性 ==="
          # 验证文件是否可读取（避免权限问题）
          [ -r "$LIB_AIO_PATH" ] || { echo "错误：libaio.so.1不可读"; exit 1; }
          echo "确认有效路径：$LIB_AIO_PATH（大小：$(du -k "$LIB_AIO_PATH" | cut -f1) KB）"
          
          echo "=== 5. 写入环境变量 ==="
          [ -w "$GITHUB_ENV" ] || { echo "错误：$GITHUB_ENV不可写"; exit 1; }
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> "$GITHUB_ENV"
          grep "LIB_AIO_PATH" "$GITHUB_ENV" || { echo "错误：环境变量写入失败"; exit 1; }
          
          echo "✅ libaio1安装完成（容错验证通过）"

      - name: 安装Python依赖（验证dmPython）
        run: |
          set -x
          # 升级pip并安装依赖
          ./python/bin/python -m pip install --upgrade pip==23.3.1
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==1.5.3 flask==2.2.5 werkzeug==2.2.3 pyinstaller==5.13.2
          
          # 关键：验证dmPython能否加载libaio（实际使用场景）
          if ! ./python/bin/python -c "import dmPython; print('dmPython版本：', dmPython.__version__)" &> /dev/null; then
            echo "错误：dmPython导入失败（可能是libaio路径问题）"
            echo "当前libaio路径：${{ env.LIB_AIO_PATH }}"
            ldd $(find ./python -name "dmPython.*.so") | grep libaio || true  # 检查依赖关联
            exit 1
          fi
          echo "✅ 所有依赖导入成功"

      - name: 打包应用
        run: |
          set -x
          [ -f "./main.py" ] || { echo "错误：未找到main.py"; exit 1; }
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          [ -f "$LIB_AIO_PATH" ] || { echo "错误：环境变量路径无效"; exit 1; }
          
          # 适配Python 3.10的依赖路径
          python_lib_path=$(find ./python/lib -name "python3.10" -type d | head -n 1)/site-packages
          [ -d "$python_lib_path" ] || { echo "错误：Python依赖路径不存在"; exit 1; }
          
          # 执行打包
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths="$python_lib_path" \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            --runtime-tmpdir=. \
            --strip \
            --no-compress \
            ./main.py
          
          # 验证产物
          [ -f "dist/myapp-linux" ] || { echo "错误：打包失败"; exit 1; }
          echo "✅ 打包完成，产物信息："
          ls -lh dist/myapp-linux
          file dist/myapp-linux  # 确认是可执行文件

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}