name: 达梦API服务打包（兼容GLIBC 2.31）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          ./python/bin/python --version

      - name: 动态查找并部署libaio.so.1（无视目录结构）
        run: |
          # 1. 安装所有可能的解压工具（确保支持所有格式）
          sudo apt-get update -y
          sudo apt-get install -y zstd tar ar
          
          # 2. 下载可靠的deb包
          wget http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb || {
            echo "错误：deb包下载失败"
            exit 1
          }
          
          # 3. 提取deb包中的数据文件（自动识别格式）
          DATA_TAR=$(ar t libaio1_0.3.113-4_amd64.deb | grep "^data.tar")
          if [ -z "$DATA_TAR" ]; then
            echo "错误：未找到data.tar文件"
            exit 1
          fi
          ar x libaio1_0.3.113-4_amd64.deb "$DATA_TAR"
          
          # 4. 完整解压数据文件到临时目录
          mkdir -p temp_lib
          if [[ "$DATA_TAR" == *.gz ]]; then
            tar -xzf "$DATA_TAR" -C temp_lib
          elif [[ "$DATA_TAR" == *.xz ]]; then
            tar -xf "$DATA_TAR" -C temp_lib
          elif [[ "$DATA_TAR" == *.zst ]]; then
            tar -I zstd -xf "$DATA_TAR" -C temp_lib
          else
            echo "错误：不支持的压缩格式"
            exit 1
          fi
          
          # 5. 动态查找libaio.so.1.0.1的实际路径
          LIB_PATH=$(find temp_lib -name "libaio.so.1.0.1" | head -n 1)
          if [ -z "$LIB_PATH" ]; then
            echo "错误：未找到libaio.so.1.0.1"
            exit 1
          fi
          echo "找到libaio.so.1.0.1路径：$LIB_PATH"
          
          # 6. 部署到系统库目录
          sudo cp "$LIB_PATH" /usr/lib/x86_64-linux-gnu/
          sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1.0.1 /usr/lib/x86_64-linux-gnu/libaio.so.1
          
          # 7. 验证部署
          sudo ldconfig
          if ! ldconfig -p | grep -q "libaio.so.1"; then
            echo "错误：部署失败"
            exit 1
          fi
          echo "✅ libaio.so.1部署成功"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install \
            dmPython==2.5.1 \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0

      - name: 打包应用
        run: |
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="/usr/lib/x86_64-linux-gnu/libaio.so.1:." \
            main.py

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
