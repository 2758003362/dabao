name: 达梦API服务打包（兼容GLIBC 2.31 + 避免排队）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境（兼容GLIBC 2.31）
        run: |
          wget https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ 静态Python配置完成，版本：$(./python/bin/python --version)"

      - name: 安装libaio1并获取低版本库
        run: |
          # 1. 安装libaio1
          echo "使用apt安装libaio1..."
          sudo apt-get update -qq
          sudo apt-get install -y libaio1
          
          # 验证安装结果
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装失败"
            exit 1
          fi
          
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          
          # 2. 下载Ubuntu 20.04的完整gcc运行时库包
          echo "下载Ubuntu 20.04的gcc运行时库包..."
          
          # 下载 libstdc++6 包
          wget -q "http://security.ubuntu.com/ubuntu/pool/main/g/gcc-10/libstdc++6_10.5.0-1ubuntu1~20.04_amd64.deb" -O libstdc++6.deb
          if [ ! -f "libstdc++6.deb" ] || ! dpkg-deb -I libstdc++6.deb &> /dev/null; then
            echo "错误：libstdc++6下载失败"
            exit 1
          fi
          
          # 下载 gcc-10-base 包以获取 libgcc_s.so.1
          wget -q "http://security.ubuntu.com/ubuntu/pool/main/g/gcc-10/gcc-10-base_10.5.0-1ubuntu1~20.04_amd64.deb" -O gcc-base.deb
          if [ ! -f "gcc-base.deb" ] || ! dpkg-deb -I gcc-base.deb &> /dev/null; then
            echo "错误：gcc-10-base下载失败"
            exit 1
          fi
          
          # 提取库文件
          mkdir -p low_glibc_libs
          dpkg-deb -x libstdc++6.deb low_glibc_libs
          dpkg-deb -x gcc-base.deb low_glibc_libs
          
          # 查找需要的库文件
          LOW_GLIBC_LIBSTDCPP_PATH=$(find ./low_glibc_libs -name "libstdc++.so.6" | head -n 1)
          LOW_GLIBC_LIBGCC_PATH=$(find ./low_glibc_libs -name "libgcc_s.so.1" | head -n 1)
          
          if [ -z "$LOW_GLIBC_LIBSTDCPP_PATH" ] || [ ! -f "$LOW_GLIBC_LIBSTDCPP_PATH" ]; then
            echo "错误：未找到低版本libstdc++.so.6"
            exit 1
          fi
          
          if [ -z "$LOW_GLIBC_LIBGCC_PATH" ] || [ ! -f "$LOW_GLIBC_LIBGCC_PATH" ]; then
            echo "错误：未找到低版本libgcc_s.so.1"
            exit 1
          fi
          
          echo "LOW_GLIBC_LIBSTDCPP_PATH=$LOW_GLIBC_LIBSTDCPP_PATH" >> $GITHUB_ENV
          echo "LOW_GLIBC_LIBGCC_PATH=$LOW_GLIBC_LIBGCC_PATH" >> $GITHUB_ENV
          
          echo "✅ 低版本库准备完成"
          echo "libstdc++.so.6: $LOW_GLIBC_LIBSTDCPP_PATH"
          echo "libgcc_s.so.1: $LOW_GLIBC_LIBGCC_PATH"
          
          # 验证GLIBC版本
          echo "检查库文件的GLIBC依赖："
          echo "=== libstdc++.so.6 ==="
          objdump -T "$LOW_GLIBC_LIBSTDCPP_PATH" | grep GLIBC_2.3 | sort -V | tail -3 || echo "检查完成"
          echo "=== libgcc_s.so.1 ==="
          objdump -T "$LOW_GLIBC_LIBGCC_PATH" | grep GLIBC_2.3 | sort -V | tail -3 || echo "检查完成"

      - name: 安装Python依赖
        run: |
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==1.5.3 flask==2.2.3 werkzeug==2.2.3 pyinstaller==5.13.0
          
          if ./python/bin/python -c "import dmPython" &> /dev/null; then
            echo "✅ dmPython安装成功"
          else
            echo "错误：dmPython安装失败"
            exit 1
          fi

      - name: 打包应用（使用LD_LIBRARY_PATH覆盖）
        run: |
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          LOW_GLIBC_LIBSTDCPP_PATH="${{ env.LOW_GLIBC_LIBSTDCPP_PATH }}"
          LOW_GLIBC_LIBGCC_PATH="${{ env.LOW_GLIBC_LIBGCC_PATH }}"
          
          # 创建自定义的spec文件，强制使用低版本库
          cat > myapp.spec << 'EOF'
# -*- mode: python ; coding: utf-8 -*-

block_cipher = None

a = Analysis(
    ['main.py'],
    pathex=[],
    binaries=[],
    datas=[],
    hiddenimports=['flask', 'dmPython', 'dmPython.dbapi2', 'pandas', 'pandas.core', 'pandas.io'],
    hookspath=[],
    hooksconfig={},
    runtime_hooks=[],
    excludes=[],
    win_no_prefer_redirects=False,
    win_private_assemblies=False,
    cipher=block_cipher,
    noarchive=False,
)

# 强制添加低版本库
a.binaries = a.binaries + [
    ('libstdc++.so.6', '$LOW_GLIBC_LIBSTDCPP_PATH', 'BINARY'),
    ('libgcc_s.so.1', '$LOW_GLIBC_LIBGCC_PATH', 'BINARY'),
    ('libaio.so.1', '$LIB_AIO_PATH', 'BINARY'),
]

pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

exe = EXE(
    pyz,
    a.scripts,
    a.binaries,
    a.zipfiles,
    a.datas,
    [],
    name='myapp-linux',
    debug=False,
    bootloader_ignore_signals=False,
    strip=False,
    upx=False,
    upx_exclude=[],
    runtime_tmpdir=None,
    console=True,
    disable_windowed_traceback=False,
    argv_emulation=False,
    target_arch=None,
    codesign_identity=None,
    entitlements_file=None,
)
EOF

          # 替换spec文件中的变量
          sed -i "s|\$LOW_GLIBC_LIBSTDCPP_PATH|$LOW_GLIBC_LIBSTDCPP_PATH|g" myapp.spec
          sed -i "s|\$LOW_GLIBC_LIBGCC_PATH|$LOW_GLIBC_LIBGCC_PATH|g" myapp.spec
          sed -i "s|\$LIB_AIO_PATH|$LIB_AIO_PATH|g" myapp.spec
          
          # 使用spec文件打包
          ./python/bin/pyinstaller myapp.spec
          
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          
          echo "详细检查最终产物的GLIBC依赖："
          echo "=== 所有GLIBC_2.3x依赖 ==="
          objdump -T dist/myapp-linux | grep -E "GLIBC_2\.3[0-9]" | sort -V | uniq
          
          echo "=== 最高GLIBC版本 ==="
          objdump -T dist/myapp-linux | grep -o "GLIBC_[0-9]\.[0-9]*" | sort -V | tail -1
          
          echo "打包完成，文件信息："
          ls -lh dist/myapp-linux
          file dist/myapp-linux
      
      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}