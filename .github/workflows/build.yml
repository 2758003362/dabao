name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 推送标签（如v1.0.38）时自动触发构建
  workflow_dispatch:  # 允许在GitHub界面手动触发，方便测试

jobs:
  build-linux:
    runs-on: ubuntu-latest  # 使用Ubuntu 24.04环境（latest对应版本）
    steps:
      # 步骤1：检出仓库代码
      - name: 检出仓库代码
        uses: actions/checkout@v4  # 拉取当前仓库的最新代码

      # 步骤2：配置静态Python环境（兼容低版本GLIBC，避免系统依赖问题）
      - name: 下载并配置静态Python
        run: |
          # 下载独立于系统的静态Python（不依赖系统GLIBC版本，兼容性强）
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # 验证Python压缩包是否下载成功
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败，请检查网络连接"
            exit 1
          fi
          
          # 解压Python到指定目录（--strip-components=1移除顶层目录，简化路径）
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          # 验证Python是否可用（检查版本）
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败，未找到可执行文件"
            exit 1
          fi
          echo "✅ 静态Python配置完成，版本：$(./python/bin/python --version)"

      # 步骤3：适配deb822源格式，启用Universe组件（核心修复：解决libaio1无安装候选问题）
      - name: 修复源配置，启用Universe组件
        run: |
          # Ubuntu 24.04使用deb822格式源文件（路径：/etc/apt/sources.list.d/ubuntu.sources）
          SOURCES_FILE="/etc/apt/sources.list.d/ubuntu.sources"
          
          # 1. 备份原源文件（避免修改出错后无法恢复）
          sudo cp "$SOURCES_FILE" "$SOURCES_FILE.bak"
          
          # 2. 关键：修改源文件，确保所有Components包含"universe"（libaio1位于该组件）
          # - 处理「Components: main」→「Components: main universe」
          sudo sed -i '/^Components:/ s/\(main\)\( *$\)/\1 universe/' "$SOURCES_FILE"
          # - 处理「Components: main restricted」→「Components: main restricted universe」
          sudo sed -i '/^Components:/ s/\(main restricted\)/\1 universe/' "$SOURCES_FILE"
          
          # 3. 验证修改结果（打印所有Components配置，确认universe已添加）
          echo "✅ 修改后的源文件Components配置："
          grep "^Components:" "$SOURCES_FILE"
          
          # 4. 强制更新源列表（应用修改后的配置）
          sudo apt-get update -y --fix-missing  # --fix-missing自动修复缺失的源文件
          
          # 5. 安装libaio1（此时Universe组件已启用，可找到安装包）
          if ! sudo apt-get install -y libaio1; then
            echo "错误：libaio1安装失败，当前源文件完整内容："
            cat "$SOURCES_FILE"  # 打印源文件内容，方便排查问题
            exit 1
          fi
          
          # 6. 验证libaio.so.1是否安装成功（确保dmPython能找到依赖）
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | awk '{print $4}')
          if [ -z "$LIB_AIO_PATH" ]; then
            echo "错误：安装后未找到libaio.so.1，依赖无效"
            exit 1
          fi
          echo "✅ libaio1安装成功，路径：$LIB_AIO_PATH"

      # 步骤4：安装Python项目依赖（含达梦驱动dmPython）
      - name: 安装Python依赖包
        run: |
          # 升级pip到最新版，减少依赖安装错误
          ./python/bin/python -m pip install --upgrade pip
          
          # 安装指定版本的依赖（确保稳定性与兼容性，避免版本冲突）
          ./python/bin/python -m pip install \
            dmPython==2.5.1 \          # 达梦数据库Python驱动（依赖libaio.so.1）
            pandas==2.1.4 \           # 数据处理库（存储过程结果可能需格式化）
            flask==2.3.3 \             # Web框架（提供API服务）
            werkzeug==2.3.7 \          # Flask依赖的WSGI工具（避免版本不兼容）
            pyinstaller==6.16.0        # 打包工具（生成单文件可执行程序）
          
          echo "✅ Python所有依赖安装完成"

      # 步骤5：打包Linux可执行程序（携带libaio.so.1，避免运行环境缺失依赖）
      - name: 打包应用为单文件可执行程序
        run: |
          # 获取libaio.so.1的实际安装路径（用于打包时携带）
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | awk '{print $4}')
          
          # 使用PyInstaller打包，强制包含所有依赖
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \  # 指定Python依赖包路径
            --hidden-import=flask \                        # 强制包含Flask核心模块（避免运行时缺失）
            --hidden-import=dmPython \                     # 强制包含达梦驱动
            --hidden-import=dmPython.dbapi2 \              # dmPython隐藏依赖（易遗漏，需手动添加）
            --hidden-import=pandas \                       # 强制包含pandas
            --hidden-import=pandas.core \                  # pandas核心子模块（处理数据结构）
            --hidden-import=pandas.io \                    # pandas IO子模块（处理数据读写）
            --add-binary="$LIB_AIO_PATH:." \               # 携带libaio.so.1到打包产物中
            main.py  # 项目入口文件（即上面的Flask服务主程序）
          
          # 验证打包产物是否生成
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败，未生成可执行文件"
            exit 1
          fi
          echo "✅ 打包完成，产物信息：$(ls -lh dist/myapp-linux)"

      # 步骤6：上传打包产物到GitHub（便于下载使用）
      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static  # 产物名称（在GitHub Actions界面可看到）
          path: dist/myapp-linux  # 产物路径（PyInstaller默认输出到dist目录）
          retention-days: 7  # 产物保留7天（可按需调整，如30天）

  # 步骤7：创建GitHub Release（仅推送标签时执行，便于分发版本）
  release:
    needs: build-linux  # 依赖build-linux任务成功后才执行
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # 仅当推送标签（如v1.0.38）时触发
    steps:
      - name: 下载打包产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static  # 对应步骤6的产物名称

      - name: 创建GitHub Release并上传产物
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux  # 上传打包后的可执行文件
          generate_release_notes: true  # 自动生成Release说明（包含近期提交记录）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动提供的令牌，无需手动配置