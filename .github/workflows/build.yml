name: 达梦API服务打包（包含加密库）-增强版

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置静态Python环境（兼容GLIBC 2.31）
        run: |
          echo "开始配置静态Python环境..."
          wget -q --show-progress https://github.com/astral-sh/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          
          PYTHON_VERSION=$(./python/bin/python --version 2>&1)
          echo "✅ 静态Python配置完成，版本：$PYTHON_VERSION"
          echo "PYTHON_PATH=$(pwd)/python/bin" >> $GITHUB_ENV

      - name: 深度验证达梦加密库
        run: |
          echo "开始深度验证达梦加密库..."
          
          # 检查dm_libs/目录是否存在
          if [ ! -d "./dm_libs" ]; then
            echo "错误：仓库中未找到dm_libs/目录"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi
          
          echo "dm_libs目录内容:"
          ls -la ./dm_libs/
          
          # 定义需要的加密库文件列表
          REQUIRED_LIBS=(
            "libcryptocme.so"
            "libdmcrypt.so"
            "libdmdpi.so"
            "libdmgmssl.so"
          )
          
          # 检查每个库文件是否存在并设置权限
          missing_libs=()
          for lib in "${REQUIRED_LIBS[@]}"; do
            if [ -f "./dm_libs/$lib" ]; then
              chmod +x "./dm_libs/$lib"
              echo "✅ 找到并设置权限: $lib"
              
              # 检查库文件完整性
              file "./dm_libs/$lib"
              ldd "./dm_libs/$lib" 2>/dev/null && echo "  ✅ 依赖检查通过" || echo "  ⚠️ 依赖检查警告"
            else
              missing_libs+=("$lib")
            fi
          done
          
          if [ ${#missing_libs[@]} -ne 0 ]; then
            echo "错误：dm_libs/目录中缺少以下加密库文件：${missing_libs[*]}"
            exit 1
          fi
          
          # 验证与Python驱动的兼容性
          export LD_LIBRARY_PATH="$(pwd)/dm_libs:$LD_LIBRARY_PATH"
          $PYTHON_PATH/python -c "
import os
print('LD_LIBRARY_PATH:', os.environ.get('LD_LIBRARY_PATH', '未设置'))
try:
    import dmPython
    print('✅ dmPython导入成功')
    print('dmPython版本:', getattr(dmPython, '__version__', '未知'))
except Exception as e:
    print('❌ dmPython导入失败:', str(e))
"
          
          # 将库文件路径存入环境变量
          echo "DM_LIBS_PATH=$(pwd)/dm_libs" >> $GITHUB_ENV
          echo "✅ 达梦加密库验证完成"

      - name: 安装系统依赖
        run: |
          echo "安装系统依赖库..."
          sudo apt-get update -qq
          sudo apt-get install -y libaio1 file binutils
          
          # 验证安装结果
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}')
          if [ -z "$LIB_AIO_PATH" ]; then
            echo "错误：libaio.so.1未找到"
            exit 1
          fi
          
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装完成: $LIB_AIO_PATH"

      - name: 获取兼容的运行时库
        run: |
          echo "获取兼容的运行时库..."
          mkdir -p compat_libs
          
          # 使用系统自带的库（确保兼容性）
          SYSTEM_LIBS=(
            "libstdc++.so.6"
            "libgcc_s.so.1"
            "libc.so.6"
          )
          
          for lib in "${SYSTEM_LIBS[@]}"; do
            lib_path=$(ldconfig -p | grep "$lib" | head -n 1 | awk '{print $4}')
            if [ -n "$lib_path" ] && [ -f "$lib_path" ]; then
              cp "$lib_path" "compat_libs/"
              echo "✅ 复制系统库: $lib"
            else
              echo "⚠️ 未找到系统库: $lib"
            fi
          done
          
          # 检查GLIBC版本兼容性
          echo "系统GLIBC版本信息:"
          ldd --version | head -n1
          
          echo "COMPAT_LIBS_PATH=$(pwd)/compat_libs" >> $GITHUB_ENV

      - name: 安装Python依赖
        run: |
          echo "安装Python依赖..."
          $PYTHON_PATH/python -m pip install --upgrade pip
          $PYTHON_PATH/python -m pip install dmPython==2.5.22 pandas==1.5.3 flask==2.2.3 pyinstaller==5.13.0
          
          # 验证依赖安装
          echo "依赖验证:"
          $PYTHON_PATH/python -c "
import sys
deps = ['dmPython', 'pandas', 'flask', 'pyinstaller']
for dep in deps:
    try:
        __import__(dep)
        print(f'✅ {dep} 导入成功')
    except Exception as e:
        print(f'❌ {dep} 导入失败: {e}')
"

      - name: 打包应用
        run: |
          echo "开始打包应用..."
          
          # 创建资源目录
          mkdir -p resources
          cp -r ${{ env.DM_LIBS_PATH }}/*.so resources/
          cp ${{ env.LIB_AIO_PATH }} resources/
          cp ${{ env.COMPAT_LIBS_PATH }}/* resources/ 2>/dev/null || true
          
          echo "资源目录内容:"
          ls -la resources/
          
          # 构建打包命令
          PYINSTALLER_CMD="$PYTHON_PATH/pyinstaller --onefile --name myapp-linux \
            --paths=$PYTHON_PATH/../lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=pandas \
            --collect-all numpy \
            --collect-all pandas \
            --add-data=\"resources:.\" \
            --strip \
            --clean \
            ./PythonDMService.py"
          
          echo "执行打包命令:"
          echo $PYINSTALLER_CMD
          eval $PYINSTALLER_CMD
          
          # 验证打包结果
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败，未生成可执行文件"
            exit 1
          fi
          
          echo "✅ 打包成功"
          echo "文件信息:"
          file dist/myapp-linux
          ls -lh dist/myapp-linux
          
          # 检查依赖
          echo "GLIBC依赖检查:"
          objdump -T dist/myapp-linux | grep GLIBC | sort -V | uniq || echo "依赖检查完成"

      - name: 创建启动和诊断脚本
        run: |
          echo "创建启动脚本..."
          
          # 启动脚本
          cat > dist/start.sh << 'EOF'
#!/bin/bash

# 获取脚本所在目录
SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
cd "$SCRIPT_DIR"

# 设置库路径
export LD_LIBRARY_PATH="$SCRIPT_DIR:$LD_LIBRARY_PATH"

echo "=========================================="
echo "达梦API服务启动器"
echo "工作目录: $SCRIPT_DIR"
echo "库路径: $LD_LIBRARY_PATH"
echo "=========================================="

# 检查必要的库文件
echo "检查库文件:"
for lib in libcryptocme.so libdmcrypt.so libdmdpi.so libdmgmssl.so libaio.so.1; do
    if [ -f "./$lib" ]; then
        echo "✅ $lib"
    else
        echo "❌ $lib (缺失)"
    fi
done

echo "启动服务..."
./myapp-linux
EOF

          # 诊断脚本
          cat > dist/diagnose.sh << 'EOF'
#!/bin/bash

echo "=== 达梦API服务诊断工具 ==="
echo "当前时间: $(date)"
echo "工作目录: $(pwd)"
echo "用户: $(whoami)"
echo ""

echo "=== 系统信息 ==="
echo "操作系统: $(uname -a)"
echo "GLIBC版本: $(ldd --version | head -n1)"
echo ""

echo "=== 环境变量 ==="
echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
echo "PATH: $PATH"
echo ""

echo "=== 文件检查 ==="
ls -la
echo ""

echo "=== 库文件检查 ==="
for lib in libcryptocme.so libdmcrypt.so libdmdpi.so libdmgmssl.so libaio.so.1; do
    if [ -f "./$lib" ]; then
        echo "✅ $lib - 存在"
        file "./$lib"
        echo "依赖关系:"
        ldd "./$lib" 2>/dev/null | while read line; do echo "  $line"; done || echo "  依赖检查失败"
        echo ""
    else
        echo "❌ $lib - 缺失"
        echo ""
    fi
done

echo "=== 可执行文件检查 ==="
if [ -f "./myapp-linux" ]; then
    echo "✅ myapp-linux - 存在"
    file "./myapp-linux"
    echo "依赖关系:"
    ldd "./myapp-linux" 2>/dev/null | while read line; do echo "  $line"; done
    echo ""
else
    echo "❌ myapp-linux - 缺失"
fi

echo "=== Python环境检查 ==="
python3 -c "
import sys, os
print('Python版本:', sys.version)
print('Python路径:', sys.executable)
print('系统路径:')
for p in sys.path:
    print(' ', p)
print('环境变量:')
for key in ['LD_LIBRARY_PATH', 'PATH']:
    print(f' {key}: {os.environ.get(key, \\\"未设置\\\")}')
" 2>/dev/null || echo "Python不可用"

echo "诊断完成"
EOF

          chmod +x dist/start.sh dist/diagnose.sh
          echo "✅ 脚本创建完成"

      - name: 测试打包结果
        run: |
          echo "测试打包结果..."
          cd dist
          
          # 运行诊断脚本
          echo "运行诊断脚本..."
          ./diagnose.sh
          
          # 检查可执行文件
          echo "检查可执行文件..."
          file myapp-linux
          ldd myapp-linux || echo "ldd检查完成"
          
          echo "✅ 测试完成"

      - name: 保存构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dameng-api-app
          path: |
            dist/myapp-linux
            dist/start.sh
            dist/diagnose.sh
          retention-days: 30

      - name: 生成版本信息
        run: |
          echo "生成版本信息..."
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          GIT_TAG=${GITHUB_REF#refs/tags/}
          VERSION=${GIT_TAG:-dev_$TIMESTAMP}
          
          cat > dist/version.txt << EOF
达梦API服务构建信息
版本: $VERSION
构建时间: $(date)
Git提交: $GITHUB_SHA
运行平台: Linux x86_64
Python版本: 3.11.8
包含加密库: 是
EOF
          
          echo "版本信息:"
          cat dist/version.txt

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dameng-api-app
          path: release/

      - name: 创建发布版本
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/myapp-linux
            release/start.sh
            release/diagnose.sh
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 显示发布信息
        run: |
          echo "🎉 发布完成!"
          echo "版本: ${GITHUB_REF#refs/tags/}"
          echo "文件已上传到GitHub Releases"