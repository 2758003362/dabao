name: Debian 11 快速打包（适配 GLIBC 2.31）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    name: 在 Debian 11 上构建
    runs-on: debian-11  # 关键：使用 Debian 11，GLIBC 2.31 且 runner 资源充足
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 执行打包
        run: pyinstaller --onefile --name myapp-linux main.py

      - name: 保存产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-debian11
          path: dist/myapp-linux
          retention-days: 5

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-debian11

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
