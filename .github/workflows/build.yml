name: 快速构建（兼容GLIBC 2.31 + 达梦依赖）

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载并配置静态Python（兼容GLIBC 2.31）
        run: |
          # 下载独立Python压缩包
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # 验证下载文件是否存在
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 解压到python目录（避免路径问题）
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          # 验证Python可用性
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          ./python/bin/python --version

      - name: 安装系统依赖（dmPython必需）
        run: |
          # 更新源并安装libaio（达梦驱动依赖）
          sudo apt-get update
          sudo apt-get install -y libaio1

      - name: 安装Python依赖（含dmPython/pandas）
        run: |
          # 升级pip并安装所有依赖
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install dmPython pandas flask werkzeug pyinstaller

      - name: 打包应用（包含所有依赖）
        run: |
          # 强制包含所有可能遗漏的依赖
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            main.py

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载Linux产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}