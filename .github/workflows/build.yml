name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 推送标签（如v1.0.41）触发构建
  workflow_dispatch:  # 允许手动触发，方便测试

jobs:
  build-linux:
    runs-on: ubuntu-latest  # 使用Ubuntu 24.04环境
    steps:
      # 步骤1：检出仓库代码
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 步骤2：配置静态Python环境（兼容低版本GLIBC）
      - name: 下载并配置静态Python
        run: |
          # 下载独立静态Python（不依赖系统GLIBC）
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # 验证下载
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          # 解压Python
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          # 验证Python可用性
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          echo "✅ 静态Python配置完成，版本：$(./python/bin/python --version)"

      # 步骤3：手动安装libaio1（解决Ubuntu 24.04源缺失问题）
      - name: 手动下载并安装libaio1
        run: |
          # 多源备选，确保下载成功
          LIB_AIO_URLS=(
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "https://mirrors.aliyun.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "http://mirrors.163.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
          )
          
          # 循环尝试下载
          for url in "${LIB_AIO_URLS[@]}"; do
            echo "从 $url 下载libaio1..."
            if wget -q "$url" -O libaio1.deb; then
              echo "✅ 下载成功"
              break
            fi
          done
          
          # 检查下载结果
          if [ ! -f "libaio1.deb" ]; then
            echo "错误：所有源均下载失败"
            exit 1
          fi
          
          # 强制安装deb包（适配Ubuntu 24.04）
          sudo dpkg -i --force-depends libaio1.deb
          
          # 验证安装
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装失败"
            exit 1
          fi
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | awk '{print $4}')
          echo "✅ libaio1安装成功，路径：$LIB_AIO_PATH"

      # 步骤4：安装Python依赖（修复pip命令格式，无空依赖）
      - name: 安装Python项目依赖
        run: |
          # 升级pip到最新版
          ./python/bin/python -m pip install --upgrade pip
          
          # 关键：所有依赖写在一行，用空格分隔，避免解析空依赖
          ./python/bin/python -m pip install dmPython==2.5.22 pandas==2.1.4 flask==2.3.3 werkzeug==2.3.7 pyinstaller==6.16.0
          
          # 验证dmPython安装（避免隐性错误）
          if ! ./python/bin/python -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython安装成功但无法导入"
            exit 1
          fi
          DM_VERSION=$(./python/bin/python -c "import dmPython; print(dmPython.__version__)")
          echo "✅ Python依赖安装完成，dmPython版本：$DM_VERSION"

      # 步骤5：打包Linux可执行程序（携带libaio.so.1）
      - name: 用PyInstaller打包应用
        run: |
          # 获取libaio.so.1路径
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | awk '{print $4}')
          
          # 打包命令（强制包含所有依赖）
          ./python/bin/pyinstaller --onefile --name myapp-linux \
            --paths=./python/lib/python3.11/site-packages \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            main.py
          
          # 验证打包产物
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败"
            exit 1
          fi
          echo "✅ 打包完成，产物路径：dist/myapp-linux"

      # 步骤6：保存打包产物
      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7  # 产物保留7天

  # 步骤7：创建GitHub Release（仅标签触发）
  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建Release并上传产物
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}