name: 达梦API服务打包（兼容GLIBC 2.31 + Ubuntu 24.04）

on:
  push:
    tags:
      - 'v*.*.*'  # 标签推送触发构建
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置静态Python环境
        run: |
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          if [ ! -f "cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz" ]; then
            echo "错误：Python压缩包下载失败"
            exit 1
          fi
          
          mkdir -p python
          tar -xzf cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz -C python --strip-components=1
          
          if [ ! -f "./python/bin/python" ]; then
            echo "错误：Python解压失败"
            exit 1
          fi
          # 记录Python关键路径（供后续编译dmPython使用）
          PYTHON_BIN="./python/bin/python"
          PYTHON_INCLUDE="./python/include/python3.11"
          PYTHON_LIB="./python/lib/python3.11"
          echo "PYTHON_BIN=$PYTHON_BIN" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$PYTHON_INCLUDE" >> $GITHUB_ENV
          echo "PYTHON_LIB=$PYTHON_LIB" >> $GITHUB_ENV
          echo "✅ 静态Python配置完成，版本：$($PYTHON_BIN --version)"

      - name: 安装libaio1（写入环境变量，跨步骤共享）
        run: |
          # 多源下载libaio1.deb（确保成功）
          LIB_AIO_URLS=(
            "http://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "https://mirrors.aliyun.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "http://mirrors.163.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
            "http://old-releases.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
          )
          
          for url in "${LIB_AIO_URLS[@]}"; do
            echo "尝试从 $url 下载libaio1..."
            if wget -q "$url" -O libaio1.deb; then
              echo "✅ 下载成功"
              break
            fi
          done
          
          if [ ! -f "libaio1.deb" ]; then
            echo "错误：所有源均下载失败"
            exit 1
          fi
          
          # 强制安装（适配Ubuntu 24.04）
          sudo dpkg -i --force-depends libaio1.deb
          if ! dpkg -s libaio1 &> /dev/null; then
            echo "错误：libaio1安装失败"
            exit 1
          fi
          
          # 关键：获取并验证libaio.so.1路径，写入环境变量
          LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
          echo "获取到的libaio路径：[$LIB_AIO_PATH]"
          
          # 双重验证路径有效性
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "错误：获取的libaio路径无效（文件不存在）"
            ls -la /lib/x86_64-linux-gnu/ | grep libaio
            exit 1
          fi
          
          echo "LIB_AIO_PATH=$LIB_AIO_PATH" >> $GITHUB_ENV
          echo "✅ libaio1安装成功，路径已写入环境变量"

      - name: 从达梦官方源码编译安装dmPython（解决下载失败）
        run: |
          # 读取环境变量中的依赖路径
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          PYTHON_INCLUDE="${{ env.PYTHON_INCLUDE }}"
          PYTHON_LIB="${{ env.PYTHON_LIB }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          
          # 验证依赖路径完整性
          for path in "$PYTHON_BIN" "$PYTHON_INCLUDE" "$PYTHON_LIB" "$LIB_AIO_PATH"; do
            if [ -z "$path" ] || [ ! -e "$path" ]; then
              echo "错误：依赖路径[$path]无效"
              exit 1
            fi
          done
          
          # 1. 从达梦官方下载站获取源码（可靠链接）
          echo "从达梦官方下载dmPython源码..."
          DM_PYTHON_URL="https://download.dameng.com/eco/adapter/python/dmPython-2.5.22-src.zip"
          # 增加重试机制，应对网络波动
          if ! wget --retry-connrefused --waitretry=3 --read-timeout=30 --timeout=15 -t 5 \
                   "$DM_PYTHON_URL" -O "dmPython-src.zip"; then
            echo "错误：dmPython源码下载失败！请访问达梦官网更新链接：https://eco.dameng.com/adapter/"
            exit 1
          fi
          
          # 2. 解压源码
          if [ ! -f "dmPython-src.zip" ]; then
            echo "错误：dmPython源码包不存在"
            exit 1
          fi
          unzip -q dmPython-src.zip -d dmPython-src
          # 动态获取源码目录（兼容不同命名）
          DM_SRC_DIR=$(find dmPython-src -maxdepth 1 -type d -name "dmPython-*" | head -n 1)
          if [ -z "$DM_SRC_DIR" ] || [ ! -d "$DM_SRC_DIR" ]; then
            echo "错误：未找到dmPython源码目录"
            ls -l dmPython-src
            exit 1
          fi
          cd "$DM_SRC_DIR"
          
          # 3. 编译安装（关联Python和libaio依赖）
          echo "用系统GCC编译dmPython（适配GLIBC 2.31）..."
          CFLAGS="-I$PYTHON_INCLUDE -I/usr/include -fPIC" \
          LDFLAGS="-L$PYTHON_LIB -L$(dirname $LIB_AIO_PATH) -laio" \
          CC="gcc" \
          $PYTHON_BIN setup.py install
          
          # 4. 验证安装结果
          cd ../..
          if ! $PYTHON_BIN -c "import dmPython" &> /dev/null; then
            echo "错误：dmPython编译安装失败"
            $PYTHON_BIN -c "import dmPython" 2>&1  # 打印详细错误
            exit 1
          fi
          echo "✅ dmPython 2.5.22 源码编译安装成功"

      - name: 安装其他Python依赖（固定版本）
        run: |
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          # 升级pip
          $PYTHON_BIN -m pip install --upgrade pip
          # 安装pandas、flask等无编译依赖的包
          $PYTHON_BIN -m pip install \
            pandas==2.1.4 \
            flask==2.3.3 \
            werkzeug==2.3.7 \
            pyinstaller==6.16.0 \
            --no-cache-dir
          
          # 验证所有依赖
          for lib in dmPython pandas flask werkzeug; do
            if ! $PYTHON_BIN -c "import $lib" &> /dev/null; then
              echo "错误：[$lib]依赖导入失败"
              exit 1
            fi
          done
          echo "✅ 所有Python依赖安装完成"

      - name: 打包应用（最终稳定版）
        run: |
          PYTHON_BIN="${{ env.PYTHON_BIN }}"
          LIB_AIO_PATH="${{ env.LIB_AIO_PATH }}"
          
          # 验证入口脚本
          echo "当前目录文件列表："
          ls -la
          if [ ! -f "./main.py" ]; then
            echo "错误：未找到入口脚本main.py"
            exit 1
          fi
          echo "✅ 确认main.py存在"
          
          # 验证libaio路径（二次容错）
          if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
            echo "警告：环境变量路径无效，重新获取..."
            LIB_AIO_PATH=$(ldconfig -p | grep "libaio.so.1" | head -n 1 | awk '{print $4}' | tr -d '\n\r')
            if [ -z "$LIB_AIO_PATH" ] || [ ! -f "$LIB_AIO_PATH" ]; then
              echo "错误：libaio路径获取失败"
              exit 1
            fi
          fi
          echo "使用的libaio路径：$LIB_AIO_PATH"
          
          # 执行打包（携带libaio依赖）
          $PYTHON_BIN -m pyinstaller --onefile --name myapp-linux \
            --paths="${{ env.PYTHON_LIB }}/site-packages" \
            --hidden-import=flask \
            --hidden-import=dmPython \
            --hidden-import=dmPython.dbapi2 \
            --hidden-import=pandas \
            --hidden-import=pandas.core \
            --hidden-import=pandas.io \
            --add-binary="$LIB_AIO_PATH:." \
            ./main.py
          
          # 验证产物
          if [ ! -f "dist/myapp-linux" ]; then
            echo "错误：打包失败，未生成产物"
            if [ -f "build/myapp-linux/warn-myapp-linux.txt" ]; then
              cat build/myapp-linux/warn-myapp-linux.txt
            fi
            exit 1
          fi
          echo "✅ 打包完成，产物信息："
          ls -lh dist/myapp-linux
          file dist/myapp-linux  # 打印产物类型（确认GLIBC兼容）

      - name: 保存打包产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-static
          path: dist/myapp-linux
          retention-days: 7

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: myapp-static

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-linux
          generate_release_notes: true
          name: "v${{ github.ref_name }}（GLIBC 2.31+兼容版）"
          body: |
            ## 兼容性说明
            - 适配系统：Ubuntu 24.04、CentOS 8+、其他GLIBC 2.31+的Linux系统
            - 无需手动安装Python、libaio，产物已携带关键依赖
            
            ## 使用步骤
            1. 下载 `myapp-linux`
            2. 赋予权限：`chmod +x myapp-linux`
            3. 启动服务：`./myapp-linux`
            4. 访问API：http://服务器IP:5000/users
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}