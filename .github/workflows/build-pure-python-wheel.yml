name: 纯Python包构建与发布

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    branches: [test-workflow]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: 设置Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel build

      - name: 构建纯Python轮包
        run: python -m build --wheel  # 关键：用纯Python方式构建

      - name: 验证轮包格式（确保是纯Python包）
        run: |
          # 检查轮包文件名是否含 "py3-none-any"（纯Python标识）
          $wheelFile = Get-ChildItem dist/*.whl | Select-Object -First 1
          if (-not $wheelFile.Name.Contains("py3-none-any")) {
              Write-Error "生成的不是纯Python轮包：$($wheelFile.Name)"
              exit 1
          }
        if: matrix.os == 'windows-latest'

      - name: 验证轮包格式（Linux/macOS）
        run: |
          wheel_file=$(find dist -name "*.whl" | head -n 1)
          if ! echo "$wheel_file" | grep -q "py3-none-any"; then
              echo "错误：生成的不是纯Python轮包：$wheel_file"
              exit 1
          fi
        if: matrix.os != 'windows-latest'

      - name: 上传轮包
        uses: actions/upload-artifact@v4
        with:
          name: pure-wheel-${{ matrix.os }}
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pure-wheel-*
          path: dist
          merge-multiple: true

      - name: 发布到PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
